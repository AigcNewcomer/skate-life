<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 - 3D跑酷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Orbitron', sans-serif;
}

#game { width: 100%; height: 100%; }

/* 开始界面 */
#startScreen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #0d0015 0%, #1a0a2e 50%, #0d0015 100%);
  z-index: 100;
  opacity: 1;
  transition: opacity 0.5s;
}

#startScreen.hidden {
  opacity: 0;
  pointer-events: none;
}

.title {
  font-size: clamp(2rem, 8vw, 4rem);
  color: #fff;
  text-shadow: 0 0 30px #0ff, 0 0 60px #0ff, 0 0 90px #f0f;
  margin-bottom: 10px;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 30px #0ff, 0 0 60px #0ff; }
  to { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f, 0 0 120px #0ff; }
}

.subtitle {
  font-size: clamp(0.8rem, 3vw, 1.2rem);
  color: rgba(255,255,255,0.6);
  margin-bottom: 50px;
  letter-spacing: 5px;
}

/* 按钮 */
.startBtn {
  background: linear-gradient(135deg, #0ff 0%, #f0f 50%, #0ff 100%);
  background-size: 200% 200%;
  color: #000;
  border: none;
  padding: 18px 60px;
  font-size: clamp(1rem, 4vw, 1.3rem);
  font-family: 'Orbitron', sans-serif;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  animation: gradientShift 3s ease infinite;
  box-shadow: 0 0 30px rgba(0,255,255,0.5), 0 0 60px rgba(255,0,255,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.startBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px rgba(0,255,255,0.8), 0 0 100px rgba(255,0,255,0.5);
}

.startBtn:active {
  transform: scale(0.95);
}

/* 控制提示 */
.hint {
  position: absolute;
  bottom: 40px;
  color: rgba(255,255,255,0.4);
  font-size: 0.8rem;
  letter-spacing: 2px;
}

/* 游戏UI */
#gameUI {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.3s;
}

#gameUI.show {
  opacity: 1;
}

.uiBox {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 12px 24px;
  border-radius: 30px;
  color: #fff;
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  border: 1px solid rgba(0,255,255,0.3);
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

.uiBox span {
  color: #0ff;
  font-weight: bold;
}

/* 主题选择 */
.themeSelect {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

.themeBtn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 0.3s;
}

.themeBtn.selected {
  border-color: #fff;
  transform: scale(1.2);
  box-shadow: 0 0 20px currentColor;
}
</style>
</head>
<body>
<div id="game"></div>

<!-- 开始界面 -->
<div id="startScreen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  
  <div class="themeSelect">
    <div class="themeBtn selected" style="background: linear-gradient(135deg, #ff69b4, #ff1493)" data-theme="pink"></div>
    <div class="themeBtn" style="background: linear-gradient(135deg, #00ff88, #00cc66)" data-theme="green"></div>
    <div class="themeBtn" style="background: linear-gradient(135deg, #00ffff, #0088ff)" data-theme="blue"></div>
    <div class="themeBtn" style="background: linear-gradient(135deg, #ff00ff, #8800ff)" data-theme="purple"></div>
  </div>
  
  <button class="startBtn" id="startBtn">开始游戏</button>
  <div class="hint">← → 左右移动 | 触碰障碍物游戏结束</div>
</div>

<!-- 游戏UI -->
<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== 游戏配置 ====================
const CONFIG = {
  themes: {
    pink: { bg: 0x1a0a15, ground: 0xff69b4, accent: 0xff1493, light: 0xffb6c1, fog: 0x1a0a15 },
    green: { bg: 0x0a150a, ground: 0x00ff88, accent: 0x00ff00, light: 0x90ee90, fog: 0x0a150a },
    blue: { bg: 0x0a0a1a, ground: 0x00ffff, accent: 0x0088ff, light: 0x87ceeb, fog: 0x0a0a1a },
    purple: { bg: 0x150a1a, ground: 0xff00ff, accent: 0x8800ff, light: 0xda70d6, fog: 0x150a1a }
  },
  laneWidth: 8,
  speed: 0.4
};

let currentTheme = 'pink';
let gameRunning = false;
let score = 0;
let distance = 0;
let playerX = 0;
let targetX = 0;

// ==================== Three.js 场景 ====================
const container = document.getElementById('game');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 6);
camera.lookAt(0, 1, -5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

// ==================== 主题设置 ====================
function setTheme(themeName) {
  currentTheme = themeName;
  const theme = CONFIG.themes[themeName];
  
  scene.background = new THREE.Color(theme.bg);
  scene.fog = new THREE.Fog(theme.fog, 15, 60);
  
  ground.material.color.setHex(theme.ground);
  ground.material.emissive.setHex(theme.accent);
  ground.material.emissiveIntensity = 0.1;
  
  playerGroup.children.forEach(child => {
    if (child.material && child.material.emissive) {
      child.material.emissive.setHex(theme.accent);
    }
  });
  
  ambientLight.color.setHex(theme.light);
  pointLight.color.setHex(theme.accent);
}

// ==================== 灯光 ====================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff00ff, 1, 30);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// ==================== 地面 ====================
const groundGeometry = new THREE.PlaneGeometry(30, 200, 30, 200);
const groundMaterial = new THREE.MeshStandardMaterial({
  color: 0xff69b4,
  roughness: 0.8,
  metalness: 0.2,
  emissive: 0xff1493,
  emissiveIntensity: 0.1
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.z = -80;
ground.receiveShadow = true;
scene.add(ground);

// 霓虹网格
const gridHelper = new THREE.GridHelper(200, 80, 0x00ffff, 0x222244);
gridHelper.position.z = -80;
scene.add(gridHelper);

// ==================== 玩家 ====================
const playerGroup = new THREE.Group();

// 滑板
const boardGeo = new THREE.BoxGeometry(1.2, 0.08, 2.2);
const boardMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
const board = new THREE.Mesh(boardGeo, boardMat);
board.position.y = 0.15;
board.castShadow = true;
playerGroup.add(board);

// 轮子
const wheelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const wheelPos = [[-0.5, 0.1, -0.8], [0.5, 0.1, -0.8], [-0.5, 0.1, 0.8], [0.5, 0.1, 0.8]];
wheelPos.forEach(pos => {
  const wheel = new THREE.Mesh(wheelGeo, wheelMat);
  wheel.position.set(...pos);
  wheel.rotation.z = Math.PI / 2;
  playerGroup.add(wheel);
});

// 身体
const bodyGeo = new THREE.CapsuleGeometry(0.25, 0.5, 4, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x004444, emissiveIntensity: 0.5 });
const playerBody = new THREE.Mesh(bodyGeo, bodyMat);
playerBody.position.y = 0.9;
playerBody.castShadow = true;
playerGroup.add(playerBody);

// 头
const headGeo = new THREE.SphereGeometry(0.22, 16, 16);
const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
const head = new THREE.Mesh(headGeo, headMat);
head.position.y = 1.55;
playerGroup.add(head);

// 头发 (霓虹色)
const hairGeo = new THREE.SphereGeometry(0.25, 16, 16);
const hairMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8 });
const hair = new THREE.Mesh(hairGeo, hairMat);
hair.position.y = 1.65;
hair.scale.y = 0.7;
playerGroup.add(hair);

playerGroup.position.y = 0.5;
scene.add(playerGroup);

// ==================== 障碍物 ====================
let obstacles = [];
const obstaclePool = [];

function createObstacle() {
  const group = new THREE.Group();
  
  // 随机类型
  const type = Math.floor(Math.random() * 3);
  
  if (type === 0) {
    // 箱子
    const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x330011, roughness: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.6;
    mesh.castShadow = true;
    group.add(mesh);
  } else if (type === 1) {
    // 圆柱
    const geo = new THREE.CylinderGeometry(0.4, 0.4, 1.8, 16);
    const mat = new THREE.MeshStandardMaterial({ color: 0x33ff66, emissive: 0x003300, roughness: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.9;
    mesh.castShadow = true;
    group.add(mesh);
  } else {
    // 三角锥
    const geo = new THREE.ConeGeometry(0.6, 1.8, 4);
    const mat = new THREE.MeshStandardMaterial({ color: 0x3366ff, emissive: 0x000033, roughness: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.9;
    mesh.castShadow = true;
    group.add(mesh);
  }
  
  return group;
}

function spawnObstacle() {
  let obs;
  if (obstaclePool.length > 0) {
    obs = obstaclePool.pop();
  } else {
    obs = createObstacle();
  }
  
  obs.position.x = (Math.random() - 0.5) * CONFIG.laneWidth;
  obs.position.z = -60 - Math.random() * 20;
  scene.add(obs);
  obstacles.push(obs);
}

// 初始障碍物
for (let i = 0; i < 15; i++) spawnObstacle();

// ==================== 粒子效果 ====================
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount * 3; i += 3) {
  particlePositions[i] = (Math.random() - 0.5) * 20;
  particlePositions[i + 1] = Math.random() * 10;
  particlePositions[i + 2] = -Math.random() * 100;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.1, transparent: true, opacity: 0.6 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ==================== 输入控制 ====================
let isTouching = false;
let touchStartX = 0;

document.addEventListener('touchstart', e => {
  isTouching = true;
  touchStartX = e.touches[0].clientX;
});

document.addEventListener('touchmove', e => {
  if (!gameRunning) return;
  e.preventDefault();
  const diff = (e.touches[0].clientX - touchStartX) * 0.02;
  targetX = Math.max(-CONFIG.laneWidth/2, Math.min(CONFIG.laneWidth/2, diff));
  touchStartX = e.touches[0].clientX;
}, { passive: false });

document.addEventListener('touchend', () => {
  isTouching = false;
  targetX = 0;
});

document.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  targetX = (e.clientX / window.innerWidth - 0.5) * CONFIG.laneWidth;
});

document.addEventListener('mousedown', e => {
  if (!gameRunning) return;
  targetX = (e.clientX / window.innerWidth - 0.5) * CONFIG.laneWidth;
});

document.addEventListener('mouseup', () => {
  if (!gameRunning) targetX = 0;
});

// ==================== 游戏逻辑 ====================
function startGame() {
  console.log('开始游戏');
  
  // 重置
  obstacles.forEach(o => {
    scene.remove(o);
    obstaclePool.push(o);
  });
  obstacles = [];
  for (let i = 0; i < 15; i++) spawnObstacle();
  
  score = 0;
  distance = 0;
  playerX = 0;
  targetX = 0;
  
  // 切换界面
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameUI').classList.add('show');
  
  setTheme(currentTheme);
  gameRunning = true;
}

function gameOver() {
  console.log('游戏结束');
  gameRunning = false;
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameUI').classList.remove('show');
}

function checkCollision() {
  for (let obs of obstacles) {
    const dx = Math.abs(obs.position.x - playerX);
    const dz = Math.abs(obs.position.z);
    if (dx < 1 && dz < 1) return true;
  }
  return false;
}

// ==================== 主题选择 ====================
document.querySelectorAll('.themeBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.themeBtn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentTheme = btn.dataset.theme;
  });
});

// ==================== 开始按钮 ====================
document.getElementById('startBtn').addEventListener('click', startGame);

// ==================== 游戏循环 ====================
function animate() {
  requestAnimationFrame(animate);
  
  if (gameRunning) {
    // 玩家移动
    playerX += (targetX - playerX) * 0.1;
    playerGroup.position.x = playerX;
    playerGroup.rotation.z = (targetX - playerX) * 0.15;
    playerGroup.position.y = 0.5 + Math.sin(Date.now() * 0.008) * 0.08;
    
    // 障碍物移动
    obstacles.forEach(obs => {
      obs.position.z += CONFIG.speed;
    });
    
    // 移除和生成
    obstacles = obstacles.filter(obs => {
      if (obs.position.z > 10) {
        scene.remove(obs);
        obstaclePool.push(obs);
        return false;
      }
      return true;
    });
    
    if (Math.random() < 0.015) spawnObstacle();
    
    // 碰撞检测
    if (checkCollision()) {
      gameOver();
    }
    
    // 更新分数
    distance += CONFIG.speed;
    score = Math.floor(distance);
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
    
    // 粒子移动
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
      positions[i + 2] += CONFIG.speed * 0.5;
      if (positions[i + 2] > 10) positions[i + 2] = -100;
    }
    particles.geometry.attributes.position.needsUpdate = true;
  }
  
  // 玩家轻微动画
  if (!gameRunning) {
    playerGroup.position.y = 0.5 + Math.sin(Date.now() * 0.003) * 0.05;
  }
  
  renderer.render(scene, camera);
}

// ==================== 窗口调整 ====================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 启动
setTheme('pink');
animate();
console.log('游戏初始化完成');
</script>
</body>
</html>
