<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 3D - 增强版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
#game { width: 100%; height: 100%; display: block; }
.screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: linear-gradient(180deg, #0a0015 0%, #1a0a2e 50%, #0a0015 100%); transition: opacity 0.5s; }
.screen.hidden { opacity: 0; pointer-events: none; }
.title { font-size: clamp(2.5rem, 12vw, 6rem); color: #fff; text-shadow: 0 0 50px #0ff, 0 0 100px #0ff, 0 0 150px #f0f; margin-bottom: 20px; animation: glow 2s ease-in-out infinite alternate; }
@keyframes glow { from { text-shadow: 0 0 50px #0ff, 0 0 100px #0ff; } to { text-shadow: 0 0 60px #f0f, 0 0 120px #f0f, 0 0 180px #0ff; } }
.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: rgba(255,255,255,0.5); margin-bottom: 40px; letter-spacing: 15px; }
.modeSelect { display: flex; flex-direction: column; gap: 18px; margin-bottom: 35px; width: min(340px, 85vw); }
.modeBtn { width: 100%; padding: 22px; border-radius: 18px; border: 2px solid rgba(0,255,255,0.35); background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1)); color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; }
.modeBtn:hover { border-color: #0ff; box-shadow: 0 0 40px rgba(0,255,255,0.5); transform: scale(1.02); }
.modeBtn.selected { border-color: #0ff; background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2)); box-shadow: 0 0 50px rgba(0,255,255,0.5); }
.modeBtn.locked { opacity: 0.5; }
.modeBtn.locked::after { content: ' 🔒'; margin-left: 10px; }
.difficulty { display: flex; gap: 15px; margin-bottom: 35px; }
.diffBtn { padding: 15px 30px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
.diffBtn:hover { background: rgba(255,255,255,0.15); }
.diffBtn.selected { border-color: #0ff; box-shadow: 0 0 25px rgba(0,255,255,0.5); }
.diffBtn.easy.selected { border-color: #4CAF50; }
.diffBtn.medium.selected { border-color: #FF9800; }
.diffBtn.hard.selected { border-color: #f44336; }
.gameBtn { background: linear-gradient(135deg, #0ff, #f0f, #0ff); background-size: 200% 200%; color: #000; border: none; padding: 22px 65px; font-size: clamp(1.1rem, 4vw, 1.5rem); font-family: 'Orbitron'; font-weight: bold; border-radius: 60px; cursor: pointer; animation: gradientShift 3s ease infinite; box-shadow: 0 0 50px rgba(0,255,255,0.6); transition: transform 0.2s; }
@keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.gameBtn:hover { transform: scale(1.08); box-shadow: 0 0 70px rgba(0,255,255,0.8); }
.stats { margin-top: 35px; color: rgba(255,255,255,0.4); font-size: 1.1rem; display: flex; gap: 35px; }
.stats span { color: #0ff; font-weight: bold; }
#gameUI { position: fixed; top: 0; left: 0; right: 0; padding: 22px 28px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 0.3s; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%); }
#gameUI.show { opacity: 1; }
.uiBox { background: rgba(0,0,0,0.75); backdrop-filter: blur(15px); padding: 16px 26px; border-radius: 40px; color: #fff; font-size: 1.2rem; border: 1px solid rgba(0,255,255,0.4); }
.uiBox span { color: #0ff; font-weight: bold; }
.level { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); padding: 14px 28px; border-radius: 35px; color: #f0f; font-size: 1.1rem; border: 1px solid rgba(255,0,255,0.4); }
.levelProgress { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: min(450px, 65%); height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; }
.levelProgressBar { height: 100%; background: linear-gradient(90deg, #0ff, #f0f); border-radius: 6px; transition: width 0.3s; }
.soundBtn { position: fixed; top: 22px; right: 22px; width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.75); border: 1px solid rgba(0,255,255,0.4); color: #0ff; font-size: 1.5rem; cursor: pointer; z-index: 60; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button class="soundBtn" onclick="toggleSound()">🔊</button>

<div id="startScreen" class="screen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  <div class="modeSelect">
    <button class="modeBtn selected" id="modeStory" onclick="setMode('story')">🏆 闯关模式</button>
    <button class="modeBtn locked" id="modeEndless" onclick="setMode('endless')">⚡ 极限模式</button>
  </div>
  <div class="difficulty">
    <button class="diffBtn easy" onclick="setDifficulty('easy')">简单</button>
    <button class="diffBtn medium selected" onclick="setDifficulty('medium')">中等</button>
    <button class="diffBtn hard" onclick="setDifficulty('hard')">困难</button>
  </div>
  <button class="gameBtn" onclick="startGame()">开始游戏</button>
  <div class="stats">最高分: <span id="highScoreDisplay">0</span> | 通关: <span id="levelProgressDisplay">0</span>/8</div>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">💎 <span id="coinDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>
<div class="level" id="levelDisplay">第 1 关</div>
<div class="levelProgress"><div class="levelProgressBar" id="progressBar"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== 配置 ==========
const LANE_COUNT = { easy: 3, medium: 4, hard: 5 };
const LEVELS = [
  { name: '第 1 关', bg: 0x1a0a15, ground: 0xff69b4, accent: 0xff1493, fog: 0x1a0a15, sky: 0xffb6c1 },
  { name: '第 2 关', bg: 0x1a1005, ground: 0xff6347, accent: 0xffd700, fog: 0x1a1005, sky: 0xffa500 },
  { name: '第 3 关', bg: 0x051005, ground: 0x228b22, accent: 0x90ee90, fog: 0x051005, sky: 0x98fb98 },
  { name: '第 4 关', bg: 0x0a0a0a, ground: 0x444444, accent: 0xaaaaaa, fog: 0x0a0a0a, sky: 0x333333 },
  { name: '第 5 关', bg: 0x000020, ground: 0x4444ff, accent: 0xff00ff, fog: 0x000020, sky: 0x191970 },
  { name: '第 6 关', bg: 0x051520, ground: 0x88ddff, accent: 0x00ffff, fog: 0x051520, sky: 0xb0e0e6 },
  { name: '第 7 关', bg: 0x1a1000, ground: 0xff6600, accent: 0xff3300, fog: 0x1a1000, sky: 0xcd853f },
  { name: '第 8 关', bg: 0x0a0020, ground: 0x00ffff, accent: 0xff00ff, fog: 0x0a0020, sky: 0x4b0082 }
];
const GAME_SPEED = { easy: 0.15, medium: 0.28, hard: 0.45 };

// ========== 音效 ==========
let soundOn = true, audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type = 'sine', vol = 0.1) {
  if(!soundOn || !audioCtx) return;
  try { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type = type; osc.frequency.value = freq; g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur); osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); } catch(e) {} }
function playCoinSound() { tone(880, 0.05); setTimeout(() => tone(1100, 0.08), 30); }
function playHitSound() { tone(80, 0.4, 'sawtooth', 0.08); }
function playUpSound() { tone(523, 0.08); setTimeout(() => tone(659, 0.08), 60); setTimeout(() => tone(784, 0.15), 120); }
function playClickSound() { tone(440, 0.02, 'sine', 0.03); }
function toggleSound() { soundOn = !soundOn; document.querySelector('.soundBtn').textContent = soundOn ? '🔊' : '🔇'; if(soundOn) initAudio(); }

// ========== 状态 ==========
let gameMode = 'story', difficulty = 'medium', currentLevel = 0, gameRunning = false;
let score = 0, coins = 0, distance = 0, levelScore = 0, lastLevelScore = 0;
let playerLane = 1, targetLane = 1;
let obstacles = [], coinItems = [], decorations = [];
let highScore = parseInt(localStorage.getItem('sl_hs') || '0');
let maxLevel = parseInt(localStorage.getItem('sl_lv') || '0');

// ========== Three.js ==========
const canvas = document.getElementById('game');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0a15, 30, 150);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 7, 12);
camera.lookAt(0, 1, -20);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

// 灯光 - 更丰富的光照
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xffffff, 1.5); sun.position.set(15, 30, 20); sun.castShadow = true; sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048; sun.shadow.camera.near = 1; sun.shadow.camera.far = 80; sun.shadow.camera.left = -30; sun.shadow.camera.right = 30; sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30; scene.add(sun);

// 霓虹灯 - 更强的效果
const neonL1 = new THREE.PointLight(0x00ffff, 3, 80); neonL1.position.set(-15, 15, -10); scene.add(neonL1);
const neonL2 = new THREE.PointLight(0xff00ff, 3, 80); neonL2.position.set(15, 15, -10); scene.add(neonL2);
const neonL3 = new THREE.PointLight(0xff00ff, 2, 60); neonL3.position.set(0, 20, -50); scene.add(neonL3);

// 地面 - 带纹理感
const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 400), new THREE.MeshStandardMaterial({ color: 0xff69b4, metalness: 0.6, roughness: 0.4 }));
ground.rotation.x = -Math.PI/2; ground.position.z = -150; ground.receiveShadow = true; scene.add(ground);

// 赛道 - 更宽更有感觉
const track = new THREE.Mesh(new THREE.PlaneGeometry(12, 400), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 }));
track.rotation.x = -Math.PI/2; track.position.y = 0.01; track.position.z = -150; track.receiveShadow = true; scene.add(track);

// 赛道边缘发光
const edgeGeo = new THREE.BoxGeometry(0.15, 0.3, 400);
const edgeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
const leftEdge = new THREE.Mesh(edgeGeo, edgeMat); leftEdge.position.set(-6, 0.15, -150); scene.add(leftEdge);
const rightEdge = new THREE.Mesh(edgeGeo, edgeMat); rightEdge.position.set(6, 0.15, -150); scene.add(rightEdge);

// 网格 - 更密集
const grid = new THREE.GridHelper(400, 160, 0x00ffff, 0x111144); grid.position.z = -150; grid.position.y = 0.02; scene.add(grid);

// ========== 玩家 - 更精致 ==========
const player = new THREE.Group();

// 滑板 - 带轮子细节
const board = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.15, 3), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.95, roughness: 0.05 }));
board.position.y = 0.3; board.castShadow = true; player.add(board);
// 滑板发光边缘
const boardGlow = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.02, 3.1), new THREE.MeshBasicMaterial({ color: 0x00ffff })); boardGlow.position.y = 0.38; player.add(boardGlow);
// 轮子
const wheelGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.12, 20);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
[[-0.6, 0.18, 1.1], [0.6, 0.18, 1.1], [-0.6, 0.18, -1.1], [0.6, 0.18, -1.1]].forEach(p => { const w = new THREE.Mesh(wheelGeo, wheelMat); w.rotation.z = Math.PI/2; w.position.set(...p); player.add(w); });

// 身体 - 穿滑板服
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.36, 1, 16), new THREE.MeshStandardMaterial({ color: 0x1a1a2e, metalness: 0.5, roughness: 0.5 }));
body.position.y = 1.1; body.castShadow = true; player.add(body);

// 头
const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
head.position.y = 1.95; head.castShadow = true; player.add(head);

// 头发 - 时尚发型
const hair = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshStandardMaterial({ color: 0x1a0a0a }));
hair.position.y = 2.1; player.add(hair);

// 墨镜 - 潮流
const glasses = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.14, 0.16), new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0 }));
glasses.position.set(0, 1.98, 0.3); player.add(glasses);
const glint = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.02, 0.02), new THREE.MeshBasicMaterial({ color: 0x00ffff })); glint.position.set(0, 1.96, 0.38); player.add(glint);

// 手臂 - 弯曲姿态
const armGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.55, 8);
const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
const leftArm = new THREE.Mesh(armGeo, skinMat); leftArm.position.set(-0.55, 1.2, 0); leftArm.rotation.z = 0.5; player.add(leftArm);
const rightArm = new THREE.Mesh(armGeo, skinMat); rightArm.position.set(0.55, 1.2, 0); rightArm.rotation.z = -0.5; player.add(rightArm);

// 腿
const legGeo = new THREE.CylinderGeometry(0.11, 0.1, 0.65, 8);
const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
const leftLeg = new THREE.Mesh(legGeo, pantsMat); leftLeg.position.set(-0.28, 0.55, 0); player.add(leftLeg);
const rightLeg = new THREE.Mesh(legGeo, pantsMat); rightLeg.position.set(0.28, 0.55, 0); player.add(rightLeg);

player.position.y = 0; scene.add(player);

// ========== 装饰物 - 路边树木和路灯 ==========
function createDecorations() {
  // 清除旧装饰
  decorations.forEach(d => scene.remove(d));
  decorations = [];
  
  const laneWidth = 12;
  const sides = [-laneWidth/2 - 2, laneWidth/2 + 2];
  
  sides.forEach(side => {
    for(let i = 0; i < 20; i++) {
      // 树木
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2, 8), new THREE.MeshStandardMaterial({ color: 0x4a3728 }));
      trunk.position.y = 1; trunk.castShadow = true; tree.add(trunk);
      const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshStandardMaterial({ color: 0x228b22 }));
      leaves.position.y = 3.5; leaves.castShadow = true; tree.add(leaves);
      tree.position.set(side + (Math.random() - 0.5) * 2, 0, -i * 20 - Math.random() * 10);
      scene.add(tree);
      decorations.push(tree);
      
      // 路灯 (每隔几棵树)
      if(i % 3 === 0) {
        const lamp = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 5, 8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        pole.position.y = 2.5; lamp.add(pole);
        const light = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffaa }));
        light.position.y = 5.2; lamp.add(light);
        const lampLight = new THREE.PointLight(0xffffaa, 1, 15); lampLight.position.y = 5.2; lamp.add(lampLight);
        lamp.position.set(side > 0 ? side + 1 : side - 1, 0, -i * 20 - 5);
        scene.add(lamp);
        decorations.push(lamp);
      }
    }
  });
  
  // 远景山脉
  for(let i = 0; i < 8; i++) {
    const mountain = new THREE.Mesh(
      new THREE.ConeGeometry(15 + Math.random() * 10, 25 + Math.random() * 15, 6),
      new THREE.MeshStandardMaterial({ color: 0x2a2a3a, flatShading: true })
    );
    mountain.position.set((Math.random() - 0.5) * 150, 10, -180 - i * 30);
    scene.add(mountain);
    decorations.push(mountain);
  }
  
  // 云层
  for(let i = 0; i < 12; i++) {
    const cloud = new THREE.Mesh(
      new THREE.SphereGeometry(3 + Math.random() * 4, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
    );
    cloud.position.set((Math.random() - 0.5) * 100, 25 + Math.random() * 10, -50 - i * 25);
    scene.add(cloud);
    decorations.push(cloud);
  }
}

// ========== 粒子 ==========
const particleCount = 1500;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pCol = new Float32Array(particleCount * 3);
for(let i = 0; i < particleCount; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 60;
  pPos[i*3+1] = Math.random() * 35;
  pPos[i*3+2] = -Math.random() * 250;
  pCol[i*3] = Math.random() * 0.4; pCol[i*3+1] = 0.8 + Math.random() * 0.2; pCol[i*3+2] = 1;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
const particleMat = new THREE.PointsMaterial({ size: 0.25, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

// ========== 函数 ==========
function setMode(m) { gameMode = m; playClickSound(); document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('selected')); document.getElementById('mode' + (m === 'story' ? 'Story' : 'Endless')).classList.add('selected'); }
function setDifficulty(d) { difficulty = d; playClickSound(); document.querySelectorAll('.diffBtn').forEach(b => b.classList.remove('selected')); document.querySelector('.diffBtn.' + d).classList.add('selected'); }

function getLaneX(lane) {
  const lanes = LANE_COUNT[difficulty];
  const width = 10;
  return (lane - (lanes - 1) / 2) * (width / lanes);
}

function setLevel(n) {
  currentLevel = Math.min(n, LEVELS.length - 1);
  const lv = LEVELS[currentLevel];
  scene.background = new THREE.Color(lv.bg);
  scene.fog.color = new THREE.Color(lv.fog);
  ground.material.color.setHex(lv.ground);
  ground.material.emissive = new THREE.Color(lv.accent);
  ground.material.emissiveIntensity = 0.25;
  document.getElementById('levelDisplay').textContent = gameMode === 'endless' ? '⚡ 极限模式' : lv.name;
}

function spawnObstacles() {
  const lanes = LANE_COUNT[difficulty];
  const occupied = [];
  const numObs = Math.floor(Math.random() * (lanes - 1)) + 1;
  
  while(occupied.length < numObs) {
    const lane = Math.floor(Math.random() * lanes);
    if(!occupied.includes(lane)) occupied.push(lane);
  }
  
  for(let i = 0; i < lanes; i++) {
    if(occupied.includes(i)) {
      const obs = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 1.6, 1.6),
        new THREE.MeshStandardMaterial({ color: 0xff2255, emissive: 0xff0044, emissiveIntensity: 0.6, metalness: 0.7, roughness: 0.3 })
      );
      obs.position.set(getLaneX(i), 0.9, -150 - Math.random() * 60);
      obs.castShadow = true;
      obs.userData.lane = i;
      scene.add(obs);
      obstacles.push(obs);
    }
  }
  
  // 金币
  if(Math.random() < 0.65) {
    let coinLane;
    do { coinLane = Math.floor(Math.random() * lanes); } while(occupied.includes(coinLane));
    const coin = new THREE.Mesh(
      new THREE.TorusGeometry(0.45, 0.14, 8, 24),
      new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.7, metalness: 1, roughness: 0.1 })
    );
    coin.position.set(getLaneX(coinLane), 1.2, -150 - Math.random() * 60);
    coin.userData.collected = false;
    scene.add(coin);
    coinItems.push(coin);
  }
}

function startGame() {
  playClickSound();
  score = 0; coins = 0; distance = 0; levelScore = 0; lastLevelScore = 0;
  playerLane = Math.floor(LANE_COUNT[difficulty] / 2);
  targetLane = playerLane;
  
  obstacles.forEach(o => scene.remove(o)); obstacles = [];
  coinItems.forEach(c => scene.remove(c)); coinItems = [];
  
  createDecorations();
  
  if(gameMode === 'story') setLevel(0); else setLevel(Math.floor(Math.random() * LEVELS.length));
  
  // 初始障碍物 - 更远
  for(let i = 0; i < 6; i++) {
    spawnObstacles();
    obstacles.forEach(function(o, idx) { o.position.z -= idx * 120; });
    coinItems.forEach(function(c, idx) { c.position.z -= idx * 120; });
  }
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameUI').classList.add('show');
  gameRunning = true;
}

function gameOver() {
  gameRunning = false; playHitSound();
  document.getElementById('gameUI').classList.remove('show');
  document.getElementById('startScreen').classList.remove('hidden');
  if(score > highScore) { highScore = score; localStorage.setItem('sl_hs', highScore); }
  if(gameMode === 'story' && currentLevel > maxLevel) { maxLevel = currentLevel; localStorage.setItem('sl_lv', maxLevel); if(maxLevel >= 7) document.getElementById('modeEndless').classList.remove('locked'); }
  document.getElementById('highScoreDisplay').textContent = highScore;
  document.getElementById('levelProgressDisplay').textContent = maxLevel;
}

// 碰撞检测
function checkCollision() {
  const playerZ = 0;
  for(const obs of obstacles) {
    const dz = Math.abs(obs.position.z - playerZ);
    if(obs.userData.lane === Math.round(playerLane) && dz < 4.5) return true;
  }
  return false;
}

function checkCoinCollection() {
  const playerZ = 0;
  for(let i = coinItems.length - 1; i >= 0; i--) {
    const coin = coinItems[i];
    if(coin.userData.collected) continue;
    const dz = Math.abs(coin.position.z - playerZ);
    if(dz < 2.5) {
      coin.userData.collected = true;
      scene.remove(coin);
      coinItems.splice(i, 1);
      coins++;
      score += 10;
      playCoinSound();
    }
  }
}

// 输入
document.addEventListener('keydown', e => {
  if(!gameRunning) return;
  const max = LANE_COUNT[difficulty] - 1;
  if(e.key === 'ArrowLeft' || e.key === 'a') targetLane = Math.max(0, targetLane - 1);
  if(e.key === 'ArrowRight' || e.key === 'd') targetLane = Math.min(max, targetLane + 1);
});

document.addEventListener('mousemove', e => {
  if(!gameRunning) return;
  const max = LANE_COUNT[difficulty] - 1;
  targetLane = Math.floor((e.clientX / window.innerWidth) * (max + 1));
  targetLane = Math.max(0, Math.min(max, targetLane));
});

document.addEventListener('touchstart', e => {
  if(!gameRunning) return;
  let startX = e.touches[0].clientX;
  const move = ev => {
    const diff = ev.touches[0].clientX - startX;
    if(Math.abs(diff) > 45) {
      const max = LANE_COUNT[difficulty] - 1;
      if(diff > 0) targetLane = Math.min(max, targetLane + 1);
      else targetLane = Math.max(0, targetLane - 1);
      startX = ev.touches[0].clientX;
    }
  };
  const end = () => { document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end); };
  document.addEventListener('touchmove', move);
  document.addEventListener('touchend', end);
});

// 循环
function animate() {
  requestAnimationFrame(animate);
  
  if(gameRunning) {
    const speed = GAME_SPEED[difficulty] + (gameMode === 'endless' ? score * 0.00005 : 0);
    
    // 玩家
    playerLane += (targetLane - playerLane) * 0.12;
    player.position.x = getLaneX(Math.round(playerLane));
    player.rotation.z = (targetLane - playerLane) * 0.45;
    player.position.y = Math.sin(Date.now() * 0.003) * 0.1;
    
    // 障碍物
    obstacles.forEach(o => { o.position.z += speed; o.rotation.y += 0.025; });
    obstacles.forEach(o => { if(o.position.z > 30) { o.position.z = -150 - Math.random() * 50; o.userData.lane = Math.floor(Math.random() * LANE_COUNT[difficulty]); o.position.x = getLaneX(o.userData.lane); } });
    
    // 金币
    coinItems.forEach(c => { c.position.z += speed; c.rotation.z += 0.12; });
    coinItems = coinItems.filter(c => { if(c.position.z > 30) { scene.remove(c); return false; } return true; });
    
    // 生成
    if(Math.random() < 0.028) spawnObstacles();
    
    // 检测
    if(checkCollision()) { gameOver(); return; }
    checkCoinCollection();
    
    // 分数
    distance += speed;
    score += Math.floor(speed * 2);
    levelScore += Math.floor(speed * 2);
    
    // 升级    // 升级
    if(gameMode === 'story' && levelScore > 500 && lastLevelScore <= 500) {
      playUpSound();
      if(currentLevel < LEVELS.length - 1) { currentLevel++; setLevel(currentLevel); }
      levelScore = 0;
    } else if(gameMode === 'endless' && levelScore > 200 && lastLevelScore <= 200) {
      playUpSound();
      setLevel(Math.floor(Math.random() * LEVELS.length));
      levelScore = 0;
    }
    lastLevelScore = levelScore;
    
    // UI
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('coinDisplay').textContent = coins;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
    const progress = (gameMode === 'endless' ? levelScore / 200 : levelScore / 500) * 100;
    document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
    
    // 粒子
    const pos = particleSystem.geometry.attributes.position.array;
    for(let i = 0; i < pos.length; i += 3) {
      pos[i+2] += speed * 0.6;
      if(pos[i+2] > 15) pos[i+2] = -250;
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
  }
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('highScoreDisplay').textContent = highScore;
document.getElementById('levelProgressDisplay').textContent = maxLevel;
if(maxLevel >= 7) document.getElementById('modeEndless').classList.remove('locked');
setLevel(0);
initAudio();
animate();
console.log('滑板人生 3D 增强版 已加载');
</script>
</body>
</html>
