<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
#start { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #1a0a20 0%, #0a0a1a 100%); z-index: 100; }
#start.hidden { display: none; }
h1 { color: #0ff; font-size: 2.5rem; margin-bottom: 10px; }
p { color: #888; margin-bottom: 30px; }
#startBtn { background: linear-gradient(135deg, #0ff, #f0f); color: #fff; border: none; padding: 18px 60px; font-size: 1.3rem; border-radius: 30px; cursor: pointer; }
#ui { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; z-index: 50; }
#ui.show { display: flex; }
.score { background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 24px; color: #fff; font-weight: bold; }
</style>
</head>
<body>
<div id="start">
<h1>🛹 滑板人生</h1>
<p>3D跑酷游戏</p>
<button id="startBtn">开始游戏</button>
<p style="margin-top:20px;font-size:12px">左右滑动控制方向</p>
</div>
<div id="ui">
<div class="score">⭐ <span id="scoreDisplay">0</span></div>
<div class="score">🏃 <span id="distDisplay">0</span>m</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 初始化
const startScreen = document.getElementById('start');
const gameUI = document.getElementById('ui');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const distDisplay = document.getElementById('distDisplay');

console.log('Three.js:', typeof THREE);

// 场景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 10, 40);

// 相机
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, -5);

// 渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// 灯光
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0x00ffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// 地面
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 200),
  new THREE.MeshStandardMaterial({ color: 0x00ffff })
);
ground.rotation.x = -Math.PI / 2;
ground.position.z = -80;
scene.add(ground);

// 玩家
const player = new THREE.Group();

// 滑板
const board = new THREE.Mesh(
  new THREE.BoxGeometry(0.8, 0.1, 1.5),
  new THREE.MeshStandardMaterial({ color: 0x8b4513 })
);
board.position.y = 0.2;
player.add(board);

// 身体
const body = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.25, 0.5, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x004444 })
);
body.position.y = 0.9;
player.add(body);

// 头
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.2, 8, 8),
  new THREE.MeshStandardMaterial({ color: 0xffdbac })
);
head.position.y = 1.5;
player.add(head);

player.position.y = 0.5;
scene.add(player);

// 障碍物
let obstacles = [];
function spawnObstacle() {
  const obs = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 1, 0.8),
    new THREE.MeshStandardMaterial({ color: 0xff4444 })
  );
  obs.position.set((Math.random() - 0.5) * 6, 0.5, -50 - Math.random() * 30);
  scene.add(obs);
  obstacles.push(obs);
}
for (let i = 0; i < 15; i++) spawnObstacle();

// 游戏状态
let running = false;
let score = 0;
let distance = 0;
let playerX = 0;
let targetX = 0;

// 输入控制
let isTouching = false;
let touchStartX = 0;

function handleStart(x) {
  touchStartX = x;
  isTouching = true;
}

function handleMove(x) {
  if (!running || !isTouching) return;
  targetX = ((x - touchStartX) / window.innerWidth) * 8;
  targetX = Math.max(-3, Math.min(3, targetX));
}

function handleEnd() {
  isTouching = false;
  targetX = 0;
}

// 鼠标事件
document.addEventListener('mousedown', e => handleStart(e.clientX));
document.addEventListener('mousemove', e => handleMove(e.clientX));
document.addEventListener('mouseup', handleEnd);

// 触摸事件
document.addEventListener('touchstart', e => {
  e.preventDefault();
  handleStart(e.touches[0].clientX);
}, { passive: false });

document.addEventListener('touchmove', e => {
  e.preventDefault();
  handleMove(e.touches[0].clientX);
}, { passive: false });

document.addEventListener('touchend', handleEnd);

// 按钮点击
startBtn.addEventListener('click', function() {
  console.log('按钮被点击');
  startGame();
});

startBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  e.stopPropagation();
  console.log('按钮触摸');
  startGame();
}, { passive: false });

function startGame() {
  console.log('开始游戏被调用');
  
  // 重置
  obstacles.forEach(o => scene.remove(o));
  obstacles = [];
  for (let i = 0; i < 15; i++) spawnObstacle();
  
  score = 0;
  distance = 0;
  playerX = 0;
  targetX = 0;
  
  // 切换界面
  startScreen.classList.add('hidden');
  gameUI.classList.add('show');
  
  running = true;
  console.log('游戏已开始');
}

function gameOver() {
  running = false;
  startScreen.classList.remove('hidden');
  gameUI.classList.remove('show');
}

// 碰撞检测
function checkCollision() {
  for (let obs of obstacles) {
    const dx = Math.abs(obs.position.x - playerX);
    const dz = Math.abs(obs.position.z);
    if (dx < 0.8 && dz < 0.8) return true;
  }
  return false;
}

// 游戏循环
function animate() {
  requestAnimationFrame(animate);
  
  if (running) {
    // 玩家移动
    playerX += (targetX - playerX) * 0.1;
    player.position.x = playerX;
    player.rotation.z = (targetX - playerX) * 0.15;
    player.position.y = 0.5 + Math.sin(Date.now() * 0.01) * 0.1;
    
    // 障碍物移动
    obstacles.forEach(o => o.position.z += 0.25);
    
    // 移除和生成
    obstacles = obstacles.filter(o => {
      if (o.position.z > 10) {
        scene.remove(o);
        return false;
      }
      return true;
    });
    
    if (Math.random() < 0.02) spawnObstacle();
    
    // 碰撞检测
    if (checkCollision()) {
      gameOver();
    }
    
    // 更新分数
    distance += 0.25;
    score = Math.floor(distance);
    scoreDisplay.textContent = score;
    distDisplay.textContent = Math.floor(distance);
  }
  
  renderer.render(scene, camera);
}

// 窗口大小调整
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 启动
animate();
console.log('游戏初始化完成');
</script>
</body>
</html>
