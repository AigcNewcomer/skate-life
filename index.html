<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>滑板人生 - 3D跑酷版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
    body { font-family: 'Noto Sans SC', sans-serif; background: #0a0a0f; }
    #gameContainer { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    
    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: linear-gradient(180deg, rgba(10,10,20,0.95) 0%, rgba(20,20,40,0.98) 100%);
      padding: 20px;
    }
    .screen.hidden { display: none; }
    .title { font-size: 2.5rem; color: #fff; margin-bottom: 20px; text-shadow: 0 0 30px rgba(0,212,255,0.5); }
    .btn { background: linear-gradient(135deg, #00d4ff, #7b2ff7); color: #fff; border: none; padding: 15px 50px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; margin: 10px; }
    #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
    .ui-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; color: #fff; font-weight: bold; }
    .controls-hint { position: absolute; bottom: 30px; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="startScreen" class="screen">
      <div class="title">🛹 滑板人生</div>
      <div style="color:#aaa;margin-bottom:15px;">3D跑酷版</div>
      <button class="btn" id="startBtn">开始游戏</button>
      <div class="controls-hint">左右滑动控制 | 躲避障碍</div>
    </div>
    <div id="gameOverScreen" class="screen hidden">
      <div class="title" id="gameOverTitle">😢 游戏结束</div>
      <div class="ui-box" id="finalScore" style="margin-bottom:20px;">得分: 0</div>
      <button class="btn" id="retryBtn">再玩一次</button>
      <button class="btn" id="homeBtn" style="background:#666;">返回主页</button>
    </div>
    <div id="ui" class="hidden">
      <div class="ui-box">⭐ <span id="score">0</span></div>
      <div class="ui-box">🏃 <span id="distance">0</span>m</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    console.log('脚本加载开始');
    
    // 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.Fog(0x0a0a1a, 10, 50);
    
    // 相机
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, -5);
    
    // 渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('gameContainer').appendChild(renderer.domElement);
    
    // 灯光
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dirLight = new THREE.DirectionalLight(0x00d4ff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);
    
    // 地面
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 200),
      new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.8 })
    );
    ground.rotation.x = -Math.PI/2;
    ground.position.z = -80;
    scene.add(ground);
    
    // 玩家
    const player = new THREE.Group();
    
    // 滑板
    const board = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.1, 2),
      new THREE.MeshStandardMaterial({ color: 0x8b4513 })
    );
    board.position.y = 0.2;
    player.add(board);
    
    // 身体
    const body = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.3, 0.6, 4, 8),
      new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x004466 })
    );
    body.position.y = 1;
    player.add(body);
    
    // 头
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xffdbac })
    );
    head.position.y = 1.7;
    player.add(head);
    
    player.position.y = 0.5;
    scene.add(player);
    
    // 障碍物
    let obstacles = [];
    
    function createObstacle() {
      const obs = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1.5, 1),
        new THREE.MeshStandardMaterial({ color: 0xff4444 })
      );
      obs.position.y = 0.75;
      return obs;
    }
    
    function spawnObstacle() {
      const obs = createObstacle();
      obs.position.x = (Math.random() - 0.5) * 8;
      obs.position.z = -60 - Math.random() * 20;
      scene.add(obs);
      obstacles.push(obs);
    }
    
    // 初始障碍物
    for(let i = 0; i < 10; i++) spawnObstacle();
    
    // 游戏状态
    let gameRunning = false;
    let score = 0;
    let distance = 0;
    let playerX = 0;
    let targetX = 0;
    
    // 输入控制
    let touchStartX = 0;
    
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    
    document.addEventListener('touchmove', e => {
      if (!gameRunning) return;
      e.preventDefault();
      const diff = (e.touches[0].clientX - touchStartX) * 0.03;
      targetX = Math.max(-4, Math.min(4, diff));
      touchStartX = e.touches[0].clientX;
    });
    
    document.addEventListener('touchend', () => {
      targetX = 0;
    });
    
    document.addEventListener('mousemove', e => {
      if (!gameRunning) return;
      targetX = (e.clientX / window.innerWidth - 0.5) * 8;
    });
    
    // 按钮事件
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('retryBtn').addEventListener('click', startGame);
    document.getElementById('homeBtn').addEventListener('click', () => {
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
    });
    
    function startGame() {
      console.log('开始游戏');
      
      // 清理
      obstacles.forEach(o => scene.remove(o));
      obstacles = [];
      for(let i = 0; i < 10; i++) spawnObstacle();
      
      score = 0;
      distance = 0;
      playerX = 0;
      targetX = 0;
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('ui').classList.remove('hidden');
      
      gameRunning = true;
    }
    
    function gameOver() {
      console.log('游戏结束');
      gameRunning = false;
      document.getElementById('ui').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.remove('hidden');
      document.getElementById('finalScore').textContent = '得分: ' + score + ' | 距离: ' + Math.floor(distance) + 'm';
    }
    
    // 游戏循环
    function animate() {
      requestAnimationFrame(animate);
      
      if (gameRunning) {
        // 玩家移动
        playerX += (targetX - playerX) * 0.1;
        player.position.x = playerX;
        player.rotation.z = (targetX - playerX) * 0.1;
        player.position.y = 0.5 + Math.sin(Date.now() * 0.01) * 0.1;
        
        // 移动障碍物
        obstacles.forEach(obs => {
          obs.position.z += 0.3;
        });
        
        // 移除并重新生成
        obstacles = obstacles.filter(obs => {
          if (obs.position.z > 10) {
            scene.remove(obs);
            return false;
          }
          return true;
        });
        
        if (Math.random() < 0.02) spawnObstacle();
        
        // 碰撞检测
        obstacles.forEach(obs => {
          const dx = Math.abs(obs.position.x - playerX);
          const dz = Math.abs(obs.position.z);
          if (dx < 1 && dz < 1) gameOver();
        });
        
        // 分数
        distance += 0.3;
        score = Math.floor(distance);
        document.getElementById('score').textContent = score;
        document.getElementById('distance').textContent = Math.floor(distance);
      }
      
      renderer.render(scene, camera);
    }
    
    // 窗口调整
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('初始化完成');
    animate();
  </script>
</body>
</html>
