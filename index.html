<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>滑板人生</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #000; }
#game { width: 100%; height: 100%; }

#startScreen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #0d0015, #1a0a2e); z-index: 100; }
.title { color: #0ff; font-size: 3rem; margin-bottom: 20px; }
.startBtn { background: linear-gradient(135deg, #0ff, #f0f); color: #000; border: none; padding: 15px 50px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; }

#gameUI { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; z-index: 50; }
.uiBox { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; color: #fff; }
.uiBox span { color: #0ff; font-weight: bold; }
</style>
</head>
<body>
<div id="game"></div>

<div id="startScreen">
  <div class="title">🛹 滑板人生</div>
  <button class="startBtn" onclick="startGame()">开始游戏</button>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="score">0</span></div>
  <div class="uiBox">🏃 <span id="dist">0</span>m</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
console.log('[1] Three.js loaded:', typeof THREE);

// Scene
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

var camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, -5);

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('game').appendChild(renderer.domElement);

console.log('[2] Scene created');

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// Ground
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 200),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
scene.add(ground);

console.log('[3] Ground added');

// Player
var player = new THREE.Group();
var body = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.3, 0.5, 4, 8),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
body.position.y = 0.8;
player.add(body);

var head = new THREE.Mesh(
  new THREE.SphereGeometry(0.25, 16, 16),
  new THREE.MeshStandardMaterial({color:0xffdbac})
);
head.position.y = 1.5;
player.add(head);

player.position.y = 0.5;
scene.add(player);

console.log('[4] Player added, children:', player.children.length);

// Obstacles
var obstacles = [];

function spawnObstacle() {
  var obs = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({color:0xff4444})
  );
  obs.position.set((Math.random()-0.5)*6, 0.5, -50-Math.random()*30);
  scene.add(obs);
  obstacles.push(obs);
}

console.log('[5] Spawning obstacles');
spawnObstacle();
spawnObstacle();
spawnObstacle();
console.log('[6] Obstacles created:', obstacles.length);

// Game state
var running = false;
var score = 0;
var distance = 0;
var px = 0;
var tx = 0;

// Input
document.addEventListener('mousemove', function(e) {
  if(running) tx = (e.clientX/window.innerWidth-0.5)*6;
});
document.addEventListener('mouseup', function() { if(running) tx = 0; });

// Start game
window.startGame = function() {
  console.log('[7] Game started');
  running = true;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
}

function gameOver() {
  console.log('[8] Game over');
  running = false;
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('gameUI').style.display = 'none';
}

// Loop
function gameLoop() {
  if(running) {
    px += (tx-px)*0.1;
    player.position.x = px;
    
    obstacles.forEach(function(o) {
      o.position.z += 0.3;
      if(o.position.z > 10) {
        o.position.z = -50-Math.random()*30;
        o.position.x = (Math.random()-0.5)*6;
      }
    });
    
    if(Math.random() < 0.02) spawnObstacle();
    
    if(obstacles.some(function(o) {
      return Math.abs(o.position.x - px) < 1 && Math.abs(o.position.z) < 1;
    })) {
      gameOver();
    }
    
    distance += 0.3;
    score = Math.floor(distance);
    document.getElementById('score').textContent = score;
    document.getElementById('dist').textContent = Math.floor(distance);
  }
  
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

console.log('[9] Starting game loop');
gameLoop();

console.log('[10] Init complete');
</script>
</body>
</html>
