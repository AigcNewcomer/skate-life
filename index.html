<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 - 3D跑酷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
#game { width: 100%; height: 100%; }

#startScreen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #0d0015, #1a0a2e); z-index: 100; }
#startScreen.hidden { display: none; }

.title { font-size: clamp(2rem, 8vw, 4rem); color: #fff; text-shadow: 0 0 30px #0ff, 0 0 60px #f0f; margin-bottom: 10px; animation: glow 2s infinite alternate; }
@keyframes glow { from { text-shadow: 0 0 30px #0ff; } to { text-shadow: 0 0 40px #f0f, 0 0 80px #0ff; } }

.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: rgba(255,255,255,0.6); margin-bottom: 40px; letter-spacing: 5px; }

.startBtn { background: linear-gradient(135deg, #0ff, #f0f); color: #000; border: none; padding: 18px 60px; font-size: clamp(1rem, 4vw, 1.3rem); font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(0,255,255,0.5); transition: transform 0.2s; }
.startBtn:hover { transform: scale(1.05); }
.startBtn:active { transform: scale(0.95); }

.hint { position: absolute; bottom: 40px; color: rgba(255,255,255,0.4); font-size: 0.8rem; }

#gameUI { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; display: none; }
#gameUI.show { display: flex; }

.uiBox { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; color: #fff; font-size: clamp(0.9rem, 3vw, 1.1rem); border: 1px solid rgba(0,255,255,0.3); }
.uiBox span { color: #0ff; font-weight: bold; }

.themeSelect { display: flex; gap: 15px; margin-bottom: 30px; }
.themeBtn { width: 50px; height: 50px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.3s; }
.themeBtn.selected { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 20px currentColor; }
</style>
</head>
<body>
<div id="game"></div>

<div id="startScreen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  <div class="themeSelect">
    <div class="themeBtn selected" style="background:linear-gradient(#ff69b4,#ff1493)" data-theme="pink" onclick="selectTheme(this, 'pink')"></div>
    <div class="themeBtn" style="background:linear-gradient(#00ff88,#00cc66)" data-theme="green" onclick="selectTheme(this, 'green')"></div>
    <div class="themeBtn" style="background:linear-gradient(#00ffff,#0088ff)" data-theme="blue" onclick="selectTheme(this, 'blue')"></div>
    <div class="themeBtn" style="background:linear-gradient(#ff00ff,#8800ff)" data-theme="purple" onclick="selectTheme(this, 'purple')"></div>
  </div>
  <button class="startBtn" id="startBtn" onclick="startGame()">开始游戏</button>
  <div class="hint">← → 左右移动 | 触碰障碍物游戏结束</div>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
console.log('[1] 脚本加载');

var CONFIG = {
  themes: { 
    pink: {bg:0x1a0a15,ground:0xff69b4,accent:0xff1493}, 
    green: {bg:0x0a150a,ground:0x00ff88,accent:0x00ff00}, 
    blue: {bg:0x0a0a1a,ground:0x00ffff,accent:0x0088ff}, 
    purple: {bg:0x150a1a,ground:0xff00ff,accent:0x8800ff} 
  },
  laneWidth: 8, 
  speed: 0.4
};

var currentTheme = 'pink';
var gameRunning = false;
var score = 0;
var distance = 0;
var playerX = 0;
var targetX = 0;
var obstacles = [];

// Scene
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 6);
camera.lookAt(0, 1, -5);

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('game').appendChild(renderer.domElement);

console.log('[2] Scene created');

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
var pointLight = new THREE.PointLight(0xff00ff, 1, 30);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// Ground
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 200),
  new THREE.MeshStandardMaterial({color:0xff69b4,emissive:0xff1493,emissiveIntensity:0.1})
);
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
scene.add(ground);

var grid = new THREE.GridHelper(200, 80, 0x00ffff, 0x222244);
grid.position.z = -80;
scene.add(grid);

console.log('[3] Ground added');

// Player
var player = new THREE.Group();

var boardMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.2, 0.08, 2.2),
  new THREE.MeshStandardMaterial({color:0x333333})
);
boardMesh.position.y = 0.2;
player.add(boardMesh);

var bodyMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.25, 0.25, 0.5, 16, 1),
  new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
bodyMesh.position.y = 0.9;
player.add(bodyMesh);

var headMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 16, 16),
  new THREE.MeshStandardMaterial({color:0xffdbac})
);
headMesh.position.y = 1.55;
player.add(headMesh);

player.position.y = 0.5;
scene.add(player);

console.log('[4] Player added, children:', player.children.length);

// Obstacles
function spawnObstacle() {
  var obs = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({color:0xff3366})
  );
  obs.position.set((Math.random()-0.5)*CONFIG.laneWidth, 0.5, -80-Math.random()*40);
  scene.add(obs);
  obstacles.push(obs);
}

console.log('[5] Spawning obstacles');
for(var i=0; i<15; i++) {
  spawnObstacle();
}
console.log('[6] Obstacles created:', obstacles.length);

// Theme
function setTheme(t) {
  var theme = CONFIG.themes[t];
  scene.background = new THREE.Color(theme.bg);
  ground.material.color.setHex(theme.ground);
  ground.material.emissive.setHex(theme.accent);
  pointLight.color.setHex(theme.accent);
}
setTheme('pink');

window.selectTheme = function(el, t) {
  document.querySelectorAll('.themeBtn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  setTheme(t);
};

// Input
document.addEventListener('touchmove', function(e) {
  if(gameRunning) {
    e.preventDefault();
    targetX = (e.touches[0].clientX/window.innerWidth-0.5)*CONFIG.laneWidth;
  }
}, {passive:false});
document.addEventListener('touchend', function() { targetX = 0; });
document.addEventListener('mousemove', function(e) {
  if(gameRunning) targetX = (e.clientX/window.innerWidth-0.5)*CONFIG.laneWidth;
});
document.addEventListener('mouseup', function() { if(gameRunning) targetX = 0; });

// Start game
window.startGame = function() {
  console.log('[7] Game started');
  gameRunning = true;
  score = 0;
  distance = 0;
  playerX = 0;
  targetX = 0;
  
  // 重置障碍物
  obstacles.forEach(function(o) {
    o.position.z = -50-Math.random()*30;
    o.position.x = (Math.random()-0.5)*CONFIG.laneWidth;
  });
  
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
  console.log('[8] Game running');
}

function gameOver() {
  console.log('[9] Game over');
  gameRunning = false;
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('gameUI').style.display = 'none';
}

// Collision - 3D distance
function checkCollision() {
  for(var k=0; k<obstacles.length; k++) {
    var obs = obstacles[k];
    var dx = Math.abs(obs.position.x - player.position.x);
    var dy = Math.abs(obs.position.y - player.position.y);
    var dz = Math.abs(obs.position.z - player.position.z);
    if(dx < 0.8 && dy < 1.2 && dz < 0.8) return true;
  }
  return false;
}

// Game Loop
function gameLoop() {
  if(gameRunning) {
    playerX += (targetX - playerX) * 0.1;
    player.position.x = playerX;
    player.rotation.z = (targetX - playerX) * 0.15;
    player.position.y = 0.5 + Math.sin(Date.now()*0.008)*0.08;
    
    obstacles.forEach(function(o) {
      o.position.z += CONFIG.speed;
      if(o.position.z > 10) {
        o.position.z = -50-Math.random()*30;
        o.position.x = (Math.random()-0.5)*CONFIG.laneWidth;
      }
    });
    
    if(Math.random() < 0.015) spawnObstacle();
    
    if(checkCollision()) {
      gameOver();
    }
    
    distance += CONFIG.speed;
    score = Math.floor(distance);
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
  }
  
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

console.log('[10] Starting loop');
gameLoop();

console.log('[11] Init complete');

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
