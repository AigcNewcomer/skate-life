<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
#game { width: 100%; height: 100%; display: block; }

/* 增强的启动画面 */
.screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: linear-gradient(180deg, #0a0015 0%, #1a0a2e 50%, #0a0015 100%); transition: opacity 0.5s; }
.screen::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 50% 0%, rgba(0,255,255,0.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(255,0,255,0.1) 0%, transparent 40%); pointer-events: none; }
.screen.hidden { opacity: 0; pointer-events: none; }

/* 标题动画 */
.title { font-size: clamp(2.5rem, 12vw, 6rem); color: #fff; text-shadow: 0 0 50px #0ff, 0 0 100px #0ff, 0 0 150px #f0f; margin-bottom: 20px; animation: glow 2s ease-in-out infinite alternate; position: relative; }
.title::after { content: '🛹'; position: absolute; left: -60px; top: 50%; transform: translateY(-50%); font-size: 0.6em; animation: float 3s ease-in-out infinite; }
@keyframes glow { from { text-shadow: 0 0 50px #0ff, 0 0 100px #0ff; } to { text-shadow: 0 0 60px #f0f, 0 0 120px #f0f, 0 0 180px #0ff; } }
@keyframes float { 0%, 100% { transform: translateY(-50%) translateX(0); } 50% { transform: translateY(-60%) translateX(10px); } }
.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: rgba(255,255,255,0.5); margin-bottom: 40px; letter-spacing: 15px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }

/* 模式选择 - 增强卡片样式 */
.modeSelect { display: flex; flex-direction: column; gap: 18px; margin-bottom: 35px; width: min(340px, 85vw); }
.modeBtn { position: relative; width: 100%; padding: 22px; border-radius: 18px; border: 2px solid rgba(0,255,255,0.35); background: linear-gradient(135deg, rgba(0,255,255,0.08) 0%, rgba(255,0,255,0.08) 100%); color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; overflow: hidden; }
.modeBtn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.5s; }
.modeBtn:hover::before { left: 100%; }
.modeBtn:hover { border-color: #0ff; box-shadow: 0 0 40px rgba(0,255,255,0.5), inset 0 0 20px rgba(0,255,255,0.1); transform: scale(1.02); }
.modeBtn.selected { border-color: #0ff; background: linear-gradient(135deg, rgba(0,255,255,0.2) 0%, rgba(255,0,255,0.2) 100%); box-shadow: 0 0 50px rgba(0,255,255,0.5), 0 0 100px rgba(255,0,255,0.3); }
.modeBtn.selected::after { content: '✓'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #0ff; font-size: 1.2rem; }
.modeBtn.locked { opacity: 0.5; }
.modeBtn.locked::after { content: ' 🔒'; margin-left: 10px; }

/* 难度选择 - 药丸按钮 */
.difficulty { display: flex; gap: 15px; margin-bottom: 35px; }
.diffBtn { position: relative; padding: 15px 30px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
.diffBtn::after { content: ''; position: absolute; inset: -2px; border-radius: 32px; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); opacity: 0; transition: opacity 0.3s; }
.diffBtn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
.diffBtn:hover::after { opacity: 1; }
.diffBtn.selected { transform: scale(1.05); }
.diffBtn.easy.selected { border-color: #4CAF50; box-shadow: 0 0 25px rgba(76,175,80,0.5); }
.diffBtn.medium.selected { border-color: #FF9800; box-shadow: 0 0 25px rgba(255,152,0,0.5); }
.diffBtn.hard.selected { border-color: #f44336; box-shadow: 0 0 25px rgba(244,67,54,0.5); }

/* 开始按钮 - 炫酷渐变 */
.gameBtn { position: relative; background: linear-gradient(135deg, #0ff, #f0f, #0ff); background-size: 200% 200%; color: #000; border: none; padding: 22px 65px; font-size: clamp(1.1rem, 4vw, 1.5rem); font-family: 'Orbitron'; font-weight: bold; border-radius: 60px; cursor: pointer; animation: gradientShift 3s ease infinite, btnGlow 2s ease-in-out infinite alternate; box-shadow: 0 0 50px rgba(0,255,255,0.6), 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.2s, box-shadow 0.2s; }
@keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
@keyframes btnGlow { from { box-shadow: 0 0 50px rgba(0,255,255,0.6); } to { box-shadow: 0 0 80px rgba(255,0,255,0.8); } }
.gameBtn:hover { transform: scale(1.08); box-shadow: 0 0 70px rgba(0,255,255,0.8), 0 15px 40px rgba(0,0,0,0.4); }
.gameBtn:active { transform: scale(0.98); }

/* 统计信息 */
.stats { margin-top: 35px; color: rgba(255,255,255,0.4); font-size: 1.1rem; display: flex; gap: 35px; }
.stats span { color: #0ff; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,255,0.5); }

/* 游戏UI - 毛玻璃效果 */
#gameUI { position: fixed; top: 0; left: 0; right: 0; padding: 22px 28px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 0.3s; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%); }
#gameUI.show { opacity: 1; }

/* 增强的UI盒子 */
.uiBox { position: relative; background: rgba(0,0,0,0.75); backdrop-filter: blur(15px); padding: 16px 26px; border-radius: 40px; color: #fff; font-size: 1.2rem; border: 1px solid rgba(0,255,255,0.4); box-shadow: 0 0 20px rgba(0,255,255,0.2), inset 0 0 20px rgba(0,255,255,0.05); transition: transform 0.2s; }
.uiBox:hover { transform: scale(1.05); }
.uiBox span { color: #0ff; font-weight: bold; text-shadow: 0 0 10px #0ff; }
.uiBox::before { content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,255,255,0.8), transparent); }

/* 关卡显示 */
.level { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 14px 28px; border-radius: 35px; color: #f0f; font-size: 1.1rem; border: 1px solid rgba(255,0,255,0.4); box-shadow: 0 0 20px rgba(255,0,255,0.3); animation: levelPulse 2s ease-in-out infinite; }
@keyframes levelPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,0,255,0.3); } 50% { box-shadow: 0 0 35px rgba(255,0,255,0.6); } }

/* 进度条 */
.levelProgress { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: min(450px, 65%); height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); }
.levelProgressBar { height: 100%; background: linear-gradient(90deg, #0ff, #f0f); border-radius: 6px; transition: width 0.3s; box-shadow: 0 0 15px rgba(0,255,255,0.5); position: relative; }
.levelProgressBar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent); border-radius: 6px 6px 0 0; }

/* 音效按钮 */
.soundBtn { position: fixed; top: 22px; right: 22px; width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.75); border: 1px solid rgba(0,255,255,0.4); color: #0ff; font-size: 1.5rem; cursor: pointer; z-index: 60; transition: all 0.3s; backdrop-filter: blur(10px); }
.soundBtn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(0,255,255,0.5); }

/* 天气切换按钮 */
.weatherBtn { position: fixed; top: 22px; right: 90px; width: 55px; height: 55px; border-radius: 50%; background: rgba(0,0,0,0.75); border: 1px solid rgba(255,0,255,0.4); color: #f0f; font-size: 1.5rem; cursor: pointer; z-index: 60; transition: all 0.3s; backdrop-filter: blur(10px); }
.weatherBtn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(255,0,255,0.5); }
.weatherBtn.rain { animation: rainBounce 0.5s ease-in-out infinite; }
@keyframes rainBounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

/* 连击显示 */
.combo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: #ffd700; text-shadow: 0 0 30px #ffd700, 0 0 60px #ff6600; opacity: 0; pointer-events: none; z-index: 70; }
.combo.show { animation: comboShow 0.8s ease-out forwards; }
@keyframes comboShow { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1); } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button class="soundBtn" onclick="toggleSound()">🔊</button>
<button class="weatherBtn" onclick="toggleWeather()">☀️</button>
<div class="combo" id="comboDisplay"></div>

<div id="startScreen" class="screen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  <div class="modeSelect">
    <button class="modeBtn selected" id="modeStory" onclick="setMode('story')">🏆 闯关模式</button>
    <button class="modeBtn locked" id="modeEndless" onclick="setMode('endless')">⚡ 极限模式</button>
  </div>
  <div class="difficulty">
    <button class="diffBtn easy" onclick="setDifficulty('easy')">简单</button>
    <button class="diffBtn medium selected" onclick="setDifficulty('medium')">中等</button>
    <button class="diffBtn hard" onclick="setDifficulty('hard')">困难</button>
  </div>
  <button class="gameBtn" onclick="startGame()">开始游戏</button>
  <div class="stats">最高分: <span id="highScoreDisplay">0</span> | 通关: <span id="levelProgressDisplay">0</span>/8</div>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">💎 <span id="coinDisplay">0</span> <span style="font-size:0.7em;opacity:0.7">/</span> <span id="totalCoinsDisplay" style="font-size:0.7em;opacity:0.7">0</span></div>
  <div class="uiBox" id="difficultyDisplay" style="font-size:0.8em"></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>
<div class="level" id="levelDisplay">第 1 关</div>
<div class="levelProgress"><div class="levelProgressBar" id="progressBar"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== 关卡系统 v2 ====================
// 难度等级定义
const DIFFICULTY_CONFIG = {
  easy: { lanes: 3, speed: 0.15, coinMult: 1.0, timeLimit: 120, name: '简单' },
  medium: { lanes: 4, speed: 0.28, coinMult: 1.5, timeLimit: 90, name: '普通' },
  hard: { lanes: 5, speed: 0.45, coinMult: 2.0, timeLimit: 60, name: '困难' },
  elite: { lanes: 6, speed: 0.6, coinMult: 3.0, timeLimit: 45, name: '精英' }
};

// 主题场景定义
const THEMES = {
  neon: { name: '霓虹之夜', bg: 0x1a0a15, ground: 0xff69b4, accent: 0xff1493, fog: 0x1a0a15, obstacles: ['neon-barrier', 'moving-car'] },
  sunset: { name: '夕阳海滩', bg: 0x1a1005, ground: 0xff6347, accent: 0xffd700, fog: 0x1a1005, obstacles: ['sand-dune', 'beach-ball'] },
  forest: { name: '雨林冒险', bg: 0x051005, ground: 0x228b22, accent: 0x90ee90, fog: 0x051005, obstacles: ['vine', 'tree-root'] },
  cyber: { name: '赛博都市', bg: 0x0a0a0a, ground: 0x444444, accent: 0xaaaaaa, fog: 0x0a0a0a, obstacles: [' hologram', 'drone'] },
  ocean: { name: '深海遨游', bg: 0x000020, ground: 0x4444ff, accent: 0xff00ff, fog: 0x000020, obstacles: ['bubble', 'seaweed'] },
  arctic: { name: '冰雪王国', bg: 0x051520, ground: 0x88ddff, accent: 0x00ffff, fog: 0x051520, obstacles: ['ice-berg', 'snow-ball'] },
  volcano: { name: '火山熔岩', bg: 0x1a1000, ground: 0xff6600, accent: 0xff3300, fog: 0x1a1000, obstacles: ['lava-rock', 'fire-trap'] },
  galaxy: { name: '星河漫步', bg: 0x0a0020, ground: 0x00ffff, accent: 0xff00ff, fog: 0x0a0020, obstacles: ['asteroid', 'ufo'] }
};

// 关卡数据 v2 - 包含主题和难度
const LEVELS = [
  { id: 1, name: '第 1 关', theme: 'neon', difficulty: 'easy', length: 400, reward: 80,
      desc: '滑动左右键躲避障碍，收集金币！' },
  { id: 2, name: '第 2 关', theme: 'sunset', difficulty: 'easy', length: 600, reward: 80 },
  { id: 3, name: '第 3 关', theme: 'forest', difficulty: 'medium', length: 700, reward: 120 },
  { id: 4, name: '第 4 关', theme: 'cyber', difficulty: 'medium', length: 800, reward: 160 },
  { id: 5, name: '第 5 关', theme: 'ocean', difficulty: 'hard', length: 900, reward: 250 },
  { id: 6, name: '第 6 关', theme: 'arctic', difficulty: 'hard', length: 1000, reward: 320 },
  { id: 7, name: '第 7 关', theme: 'volcano', difficulty: 'elite', length: 1200, reward: 500 },
  { id: 8, name: '第 8 关', theme: 'galaxy', difficulty: 'elite', length: 1500, reward: 800 }
];

// 兼容旧版
const LANE_COUNT = { easy: 3, medium: 4, hard: 5 };
const GAME_SPEED = { easy: 0.15, medium: 0.28, hard: 0.45 };

// 获取当前关卡配置
function getLevelConfig(levelIndex) {
  const level = LEVELS[levelIndex] || LEVELS[0];
  const diff = DIFFICULTY_CONFIG[level.difficulty] || DIFFICULTY_CONFIG.easy;
  const theme = THEMES[level.theme] || THEMES.neon;
  return { ...diff, ...theme, level };
}

// 天气系统
let weatherOn = false;
let raindrops = [];
const RAINDROP_COUNT = 800;

function createRaindrops() {
  const rainGeo = new THREE.BufferGeometry();
  const rainPos = new Float32Array(RAINDROP_COUNT * 3);
  for(let i = 0; i < RAINDROP_COUNT; i++) {
    rainPos[i*3] = (Math.random() - 0.5) * 60;
    rainPos[i*3+1] = Math.random() * 40;
    rainPos[i*3+2] = (Math.random() - 0.5) * 200 - 50;
  }
  rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
  const rainMat = new THREE.PointsMaterial({ color: 0xaaaaff, size: 0.15, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
  return new THREE.Points(rainGeo, rainMat);
}

const rainSystem = createRaindrops();
rainSystem.visible = false;
scene.add(rainSystem);

// 第一关霓虹门装饰
function createNeonGate() {
  const group = new THREE.Group();
  // 左侧霓虹柱
  const leftPost = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.3, 20, 8),
    new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 })
  );
  leftPost.position.set(-8, 10, -50);
  group.add(leftPost);
  // 右侧霓虹柱
  const rightPost = leftPost.clone();
  rightPost.position.set(8, 10, -50);
  group.add(rightPost);
  // 顶部霓虹弧
  const topArc = new THREE.Mesh(
    new THREE.TorusGeometry(8, 0.2, 8, 32, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 2 })
  );
  topArc.position.set(0, 20, -50);
  topArc.rotation.x = Math.PI / 2;
  group.add(topArc);
  // 发光文字
  return group;
}
const neonGate = createNeonGate();
scene.add(neonGate);


function toggleWeather() {
  weatherOn = !weatherOn;
  rainSystem.visible = weatherOn;
  document.querySelector('.weatherBtn').textContent = weatherOn ? '🌧️' : '☀️';
  document.querySelector('.weatherBtn').classList.toggle('rain', weatherOn);
  playClickSound();
}

function updateRain(speed) {
  if(!weatherOn) return;
  const pos = rainSystem.geometry.attributes.position.array;
  for(let i = 0; i < RAINDROP_COUNT; i++) {
    pos[i*3+1] -= 0.8 + speed * 2;
    pos[i*3+2] += speed * 0.5;
    if(pos[i*3+1] < 0) { pos[i*3+1] = 40; pos[i*3+2] = (Math.random() - 0.5) * 200 - 50; }
    if(pos[i*3+2] > 20) pos[i*3+2] = -150;
  }
  rainSystem.geometry.attributes.position.needsUpdate = true;
}

// 滑板火花尾迹效果
let sparkParticles = null;
const SPARK_COUNT = 100;

function createSparkSystem() {
  const sparkGeo = new THREE.BufferGeometry();
  const sparkPos = new Float32Array(SPARK_COUNT * 3);
  const sparkCol = new Float32Array(SPARK_COUNT * 3);
  const sparkLife = new Float32Array(SPARK_COUNT);
  for(let i = 0; i < SPARK_COUNT; i++) {
    sparkPos[i*3] = 0; sparkPos[i*3+1] = -10; sparkPos[i*3+2] = 0;
    sparkCol[i*3] = 1; sparkCol[i*3+1] = 0.5 + Math.random() * 0.5; sparkCol[i*3+2] = 0;
    sparkLife[i] = 0;
  }
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
  sparkGeo.setAttribute('color', new THREE.BufferAttribute(sparkCol, 3));
  const sparkMat = new THREE.PointsMaterial({ size: 0.3, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
  return new THREE.Points(sparkGeo, sparkMat);
}

sparkParticles = createSparkSystem();
scene.add(sparkParticles);

let sparkIndex = 0;
function emitSparks() {
  if(!gameRunning) return;
  const pos = sparkParticles.geometry.attributes.position.array;
  const col = sparkParticles.geometry.attributes.position.array;
  const lane = LANE_COUNT[difficulty];
  const px = player.position.x;
  for(let i = 0; i < 3; i++) {
    const idx = sparkIndex % SPARK_COUNT;
    pos[idx*3] = px + (Math.random() - 0.5) * 0.5;
    pos[idx*3+1] = 0.2;
    pos[idx*3+2] = 1.5 + Math.random() * 0.5;
    sparkIndex++;
  }
  sparkParticles.geometry.attributes.position.needsUpdate = true;
}

function updateSparks() {
  const pos = sparkParticles.geometry.attributes.position.array;
  for(let i = 0; i < SPARK_COUNT; i++) {
    if(pos[i*3+1] >= 0) {
      pos[i*3+1] -= 0.15;
      pos[i*3] += (Math.random() - 0.5) * 0.2;
      pos[i*3+2] += 0.1;
    } else {
      pos[i*3+1] = -10;
    }
  }
  sparkParticles.geometry.attributes.position.needsUpdate = true;
}

// 连击系统
let comboCount = 0;
let lastCoinTime = 0;
function checkCombo() {
  const now = Date.now();
  if(now - lastCoinTime < 1500) {
    comboCount++;
    if(comboCount >= 2) showCombo(comboCount);
  } else {
    comboCount = 1;
  }
  lastCoinTime = now;
}

function showCombo(count) {
  const el = document.getElementById('comboDisplay');
  el.textContent = count + ' COMBO!';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  // 连击加分
  score += count * 5;
  playCoinSound();
}

let soundOn = true, audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type = 'sine', vol = 0.1) {
  if(!soundOn || !audioCtx) return;
  try { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type = type; osc.frequency.value = freq; g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur); osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); } catch(e) {} }
function playCoinSound() { tone(880, 0.05); setTimeout(() => tone(1100, 0.08), 30); }
function playHitSound() { tone(80, 0.4, 'sawtooth', 0.08); }
function playUpSound() { tone(523, 0.08); setTimeout(() => tone(659, 0.08), 60); setTimeout(() => tone(784, 0.15), 120); }
function playClickSound() { tone(440, 0.02, 'sine', 0.03); }
function toggleSound() { soundOn = !soundOn; document.querySelector('.soundBtn').textContent = soundOn ? '🔊' : '🔇'; if(soundOn) initAudio(); }

let gameMode = 'story', difficulty = 'medium', currentLevel = 0, gameRunning = false;
let score = 0, coins = 0, distance = 0, levelScore = 0, lastLevelScore = 0;
let playerLane = 1, targetLane = 1;
let obstacles = [], coinItems = [], decorations = [];
let highScore = parseInt(localStorage.getItem('sl_hs') || '0');
let maxLevel = parseInt(localStorage.getItem('sl_lv') || '0');

const canvas = document.getElementById('game');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0a15, 30, 150);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(0, 7, 12);
camera.lookAt(0, 1, -20);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

function createDecorations() {
  decorations.forEach(d => { if(d) scene.remove(d); });
  decorations = [];
  
  const sides = [-10, 10];
  sides.forEach(side => {
    for(let i = 0; i < 15; i++) {
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2, 8), new THREE.MeshStandardMaterial({ color: 0x4a3728 }));
      trunk.position.y = 1; trunk.castShadow = true; tree.add(trunk);
      const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshStandardMaterial({ color: 0x228b22 }));
      leaves.position.y = 3.5; leaves.castShadow = true; tree.add(leaves);
      tree.position.set(side + (Math.random() - 0.5) * 3, 0, -i * 25 - Math.random() * 10);
      scene.add(tree);
      decorations.push(tree);
      
      if(i % 4 === 0) {
        const lamp = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 5, 8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        pole.position.y = 2.5; lamp.add(pole);
        const light = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffaa }));
        light.position.y = 5.2; lamp.add(light);
        const lampLight = new THREE.PointLight(0xffffaa, 1, 15); lampLight.position.y = 5.2; lamp.add(lampLight);
        lamp.position.set(side > 0 ? side + 2 : side - 2, 0, -i * 25 - 8);
        scene.add(lamp);
        decorations.push(lamp);
      }
    }
  });
  
  for(let i = 0; i < 6; i++) {
    const mountain = new THREE.Mesh(new THREE.ConeGeometry(15 + Math.random() * 10, 25 + Math.random() * 15, 6), new THREE.MeshStandardMaterial({ color: 0x2a2a3a, flatShading: true }));
    mountain.position.set((Math.random() - 0.5) * 150, 10, -180 - i * 30);
    scene.add(mountain);
    decorations.push(mountain);
  }
  
  for(let i = 0; i < 10; i++) {
    const cloud = new THREE.Mesh(new THREE.SphereGeometry(3 + Math.random() * 4, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 }));
    cloud.position.set((Math.random() - 0.5) * 100, 25 + Math.random() * 10, -50 - i * 25);
    scene.add(cloud);
    decorations.push(cloud);
  }
}

const particleCount = 1500;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pCol = new Float32Array(particleCount * 3);
for(let i = 0; i < particleCount; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 60;
  pPos[i*3+1] = Math.random() * 35;
  pPos[i*3+2] = -Math.random() * 250;
  pCol[i*3] = Math.random() * 0.4; pCol[i*3+1] = 0.8 + Math.random() * 0.2; pCol[i*3+2] = 1;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
const particleMat = new THREE.PointsMaterial({ size: 0.25, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

function setMode(m) { gameMode = m; playClickSound(); document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('selected')); document.getElementById('mode' + (m === 'story' ? 'Story' : 'Endless')).classList.add('selected'); }
function setDifficulty(d) { difficulty = d; playClickSound(); document.querySelectorAll('.diffBtn').forEach(b => b.classList.remove('selected')); document.querySelector('.diffBtn.' + d).classList.add('selected'); }

function getLaneX(lane) {
  const lanes = LANE_COUNT[difficulty];
  const width = 10;
  return (lane - (lanes - 1) / 2) * (width / lanes);
}

function setLevel(n) {
  currentLevel = Math.min(n, LEVELS.length - 1);
  const lv = LEVELS[currentLevel];
  scene.background = new THREE.Color(lv.bg);
  scene.fog.color = new THREE.Color(lv.fog);
  ground.material.color.setHex(lv.ground);
  ground.material.emissive = new THREE.Color(lv.accent);
  ground.material.emissiveIntensity = 0.25;
  document.getElementById('levelDisplay').textContent = gameMode === 'endless' ? '⚡ 极限模式' : lv.name;
}

function spawnObstacles() {
  const lanes = LANE_COUNT[difficulty];
  const occupied = [];
  const numObs = Math.floor(Math.random() * (lanes - 1)) + 1;
  
  while(occupied.length < numObs) {
    const lane = Math.floor(Math.random() * lanes);
    if(!occupied.includes(lane)) occupied.push(lane);
  }
  
  for(let i = 0; i < lanes; i++) {
    if(occupied.includes(i)) {
      const obs = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 1.6), new THREE.MeshStandardMaterial({ color: 0xff2255, emissive: 0xff0044, emissiveIntensity: 0.6, metalness: 0.7, roughness: 0.3 }));
      obs.position.set(getLaneX(i), 0.9, -80 - Math.random() * 40);
      obs.castShadow = true;
      obs.userData.lane = i;
      scene.add(obs);
      obstacles.push(obs);
    }
  }
  
  if(Math.random() < 0.65) {
    let coinLane;
    do { coinLane = Math.floor(Math.random() * lanes); } while(occupied.includes(coinLane));
    const coin = new THREE.Mesh(new THREE.TorusGeometry(0.45, 0.14, 8, 24), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.7, metalness: 1, roughness: 0.1 }));
    coin.position.set(getLaneX(coinLane), 1.2, -80 - Math.random() * 40);
    coin.userData.collected = false;
    scene.add(coin);
    coinItems.push(coin);
  }
}

function startGame() {
  playClickSound();
  score = 0; coins = 0; distance = 0; levelScore = 0; lastLevelScore = 0;
  playerLane = Math.floor(LANE_COUNT[difficulty] / 2);
  targetLane = playerLane;
  
  obstacles.forEach(o => scene.remove(o)); obstacles = [];
  coinItems.forEach(c => scene.remove(c)); coinItems = [];
  
  createDecorations();
  
  if(gameMode === 'story') setLevel(0); else setLevel(Math.floor(Math.random() * LEVELS.length));
  
  // 初始障碍物 - 更远更分散
  for(let i = 0; i < 8; i++) {
    spawnObstacles();
  }
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameUI').classList.add('show');
  gameRunning = true;
}

function gameOver() {
  gameRunning = false; playHitSound();
  document.getElementById('gameUI').classList.remove('show');
  document.getElementById('startScreen').classList.remove('hidden');
  if(score > highScore) { highScore = score; localStorage.setItem('sl_hs', highScore); }
  if(gameMode === 'story' && currentLevel > maxLevel) { maxLevel = currentLevel; localStorage.setItem('sl_lv', maxLevel); if(maxLevel >= 7) document.getElementById('modeEndless').classList.remove('locked'); }
  document.getElementById('highScoreDisplay').textContent = highScore;
  document.getElementById('levelProgressDisplay').textContent = maxLevel;
}

function checkCollision() {
  const playerX = player.position.x;
  const playerZ = 0;
  
  for(const obs of obstacles) {
    const dz = Math.abs(obs.position.z - playerZ);
    // 使用实际位置判断，给予更大容错空间
    if(Math.abs(playerX - obs.position.x) < 2.0 && dz < 10.0) return true;
  }
  return false;
}

function checkCoinCollection() {
  const playerZ = 0;
  // ==================== 金币系统 v2 ====================
// 金币收集特效
const coinParticles = [];
const COIN_PARTICLE_COUNT = 20;

function createCoinCollectEffect(coinPosition) {
  const particles = [];
  for(let i = 0; i < COIN_PARTICLE_COUNT; i++) {
    const geo = new THREE.SphereGeometry(0.08, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 1 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(coinPosition);
    p.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      Math.random() * 0.2 + 0.1,
      (Math.random() - 0.5) * 0.3
    );
    p.life = 1.0;
    scene.add(p);
    particles.push(p);
  }
  coinParticles.push(...particles);
}

function updateCoinParticles() {
  for(let i = coinParticles.length - 1; i >= 0; i--) {
    const p = coinParticles[i];
    p.position.add(p.velocity);
    p.velocity.y -= 0.01; // 重力
    p.life -= 0.03;
    p.material.opacity = p.life;
    p.scale.setScalar(p.life);
    if(p.life <= 0) {
      scene.remove(p);
      coinParticles.splice(i, 1);
    }
  }
}

// 关卡金币奖励
function addLevelReward() {
  const level = LEVELS[currentLevel] || LEVELS[0];
  const diff = DIFFICULTY_CONFIG[level.difficulty] || DIFFICULTY_CONFIG.easy;
  const reward = Math.floor(level.reward * diff.coinMult);
  coins += reward;
  score += reward * 10;
  showRewardPopup(reward);
}

function showRewardPopup(amount) {
  const popup = document.createElement('div');
  popup.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 2rem; color: #ffd700; text-shadow: 0 0 20px #ffd700;
    animation: comboShow 1s ease-out forwards; z-index: 100;
  `;
  popup.textContent = `+${amount} 💎`;
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

// 存档管理
function saveGameData() {
  const data = {
    totalCoins: (window.gameData?.totalCoins || 0) + coins,
    highScore: Math.max(window.gameData?.highScore || 0, score),
    levelsUnlocked: Math.max(window.gameData?.levelsUnlocked || 1, currentLevel + 1),
    savedAt: Date.now()
  };
  window.gameData = data;
  localStorage.setItem('skateLifeData', JSON.stringify(data));
}

function loadGameData() {
  try {
    const data = JSON.parse(localStorage.getItem('skateLifeData'));
    window.gameData = data || { totalCoins: 0, highScore: 0, levelsUnlocked: 1 };
  } catch(e) {
    window.gameData = { totalCoins: 0, highScore: 0, levelsUnlocked: 1 };
  }
  return window.gameData;
}

// 初始化存档
loadGameData();

// 金币收集逻辑
for(let i = coinItems.length - 1; i >= 0; i--) {
    const coin = coinItems[i];
    if(coin.userData.collected) continue;
    const dz = Math.abs(coin.position.z - playerZ);
    if(dz < 2.5) {
      coin.userData.collected = true;
      createCoinCollectEffect(coin.position.clone());
      scene.remove(coin);
      coinItems.splice(i, 1);
      coins++;
      score += 10;
      checkCombo();
      playCoinSound();
    }
  }
}

// 更新金币粒子
updateCoinParticles();

document.addEventListener('keydown', e => {
  if(!gameRunning) return;
  const max = LANE_COUNT[difficulty] - 1;
  if(e.key === 'ArrowLeft' || e.key === 'a') targetLane = Math.max(0, targetLane - 1);
  if(e.key === 'ArrowRight' || e.key === 'd') targetLane = Math.min(max, targetLane + 1);
});

document.addEventListener('mousemove', e => {
  if(!gameRunning) return;
  const max = LANE_COUNT[difficulty] - 1;
  targetLane = Math.floor((e.clientX / window.innerWidth) * (max + 1));
  targetLane = Math.max(0, Math.min(max, targetLane));
});

document.addEventListener('touchstart', e => {
  if(!gameRunning) return;
  let startX = e.touches[0].clientX;
  const move = ev => {
    const diff = ev.touches[0].clientX - startX;
    if(Math.abs(diff) > 45) {
      const max = LANE_COUNT[difficulty] - 1;
      if(diff > 0) targetLane = Math.min(max, targetLane + 1);
      else targetLane = Math.max(0, targetLane - 1);
      startX = ev.touches[0].clientX;
    }
  };
  const end = () => { document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end); };
  document.addEventListener('touchmove', move);
  document.addEventListener('touchend', end);
});

function animate() {
  requestAnimationFrame(animate);
  
  if(gameRunning) {
    const speed = GAME_SPEED[difficulty] + (gameMode === 'endless' ? score * 0.00005 : 0);
    
    playerLane += (targetLane - playerLane) * 0.12;
    player.position.x = getLaneX(Math.round(playerLane));
    player.rotation.z = (targetLane - playerLane) * 0.45;
    player.position.y = Math.sin(Date.now() * 0.003) * 0.1;
    
    obstacles.forEach(o => { o.position.z += speed; o.rotation.y += 0.025; });
    obstacles.forEach(o => { if(o.position.z > 30) { o.position.z = -80 - Math.random() * 40; o.userData.lane = Math.floor(Math.random() * LANE_COUNT[difficulty]); o.position.x = getLaneX(o.userData.lane); } });
    
    coinItems.forEach(c => { c.position.z += speed; c.rotation.z += 0.12; });
    coinItems = coinItems.filter(c => { if(c.position.z > 30) { scene.remove(c); return false; } return true; });
    
    if(Math.random() < 0.025) spawnObstacles();
    
    if(checkCollision()) { gameOver(); return; }
    checkCoinCollection();
    
    distance += speed;
    score += Math.floor(speed * 2);
    levelScore += Math.floor(speed * 2);
    
    if(gameMode === 'story' && levelScore > 500 && lastLevelScore <= 500) {
      playUpSound();
      addLevelReward(); // 关卡完成奖励金币
      saveGameData(); // 保存存档
      if(currentLevel < LEVELS.length - 1) { currentLevel++; setLevel(currentLevel); }
      levelScore = 0;
    } else if(gameMode === 'endless' && levelScore > 200 && lastLevelScore <= 200) {
      playUpSound();
      addLevelReward(); // 关卡完成奖励金币
      saveGameData(); // 保存存档
      setLevel(Math.floor(Math.random() * LEVELS.length));
      levelScore = 0;
    }
    lastLevelScore = levelScore;
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('coinDisplay').textContent = coins;
    document.getElementById('totalCoinsDisplay').textContent = window.gameData?.totalCoins || 0;
    
    // 显示当前关卡难度
    const level = LEVELS[currentLevel] || LEVELS[0];
    const diff = DIFFICULTY_CONFIG[level.difficulty] || DIFFICULTY_CONFIG.easy;
    const diffDisplay = document.getElementById('difficultyDisplay');
    if(diffDisplay) {
      const multipliers = { 1: 'x1', 1.5: 'x1.5', 2: 'x2', 3: 'x3' };
      diffDisplay.textContent = `${diff.name} ${multipliers[diff.coinMult] || 'x1'}`;
    }
    
    document.getElementById('distDisplay').textContent = Math.floor(distance);
    const progress = (gameMode === 'endless' ? levelScore / 200 : levelScore / 500) * 100;
    document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
    
    const pos = particleSystem.geometry.attributes.position.array;
    for(let i = 0; i < pos.length; i += 3) {
      pos[i+2] += speed * 0.6;
      if(pos[i+2] > 15) pos[i+2] = -250;
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;

    // 更新天气系统
    updateRain(speed);

    // 更新火花尾迹
    updateSparks();
    if(Math.random() < 0.3) emitSparks();
  }
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('highScoreDisplay').textContent = highScore;
document.getElementById('levelProgressDisplay').textContent = maxLevel;
if(maxLevel >= 7) document.getElementById('modeEndless').classList.remove('locked');
setLevel(0);
initAudio();
animate();
console.log('滑板人生 3D 已加载');
