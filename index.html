<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 - 第2关：热带夏日</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
#game { width: 100%; height: 100%; }

/* 热带夏日主题 - 开始屏幕 */
#startScreen { 
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  background: linear-gradient(180deg, #1a0a30 0%, #ff8c00 20%, #ffd700 40%, #00ced1 70%, #87ceeb 100%);
  z-index: 100;
}
#startScreen.hidden { display: none; }

.sun { position: absolute; top: 10%; right: 15%; width: 80px; height: 80px; background: radial-gradient(circle, #ffd700, #ff8c00); border-radius: 50%; box-shadow: 0 0 60px #ffd700, 0 0 100px #ff8c00; animation: sunPulse 3s infinite ease-in-out; }
@keyframes sunPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

.palm { position: absolute; bottom: 0; font-size: 120px; opacity: 0.3; }
.palm.left { left: 5%; transform: scaleX(-1); }
.palm.right { right: 5%; }

.title { font-size: clamp(2rem, 8vw, 4rem); color: #fff; text-shadow: 0 0 30px #ff8c00, 0 0 60px #ffd700; margin-bottom: 10px; animation: glow 2s infinite alternate; }
@keyframes glow { from { text-shadow: 0 0 30px #ff8c00; } to { text-shadow: 0 0 40px #ffd700, 0 0 80px #00ced1; } }

.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: rgba(255,255,255,0.8); margin-bottom: 40px; letter-spacing: 5px; text-shadow: 0 0 10px #ff8c00; }

.startBtn { background: linear-gradient(135deg, #ff8c00, #ffd700); color: #000; border: none; padding: 18px 60px; font-size: clamp(1rem, 4vw, 1.3rem); font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(255,140,0,0.5); transition: transform 0.2s; }
.startBtn:hover { transform: scale(1.05); }

.hint { position: absolute; bottom: 40px; color: rgba(255,255,255,0.6); font-size: 0.8rem; }

.levelSelect { display: flex; gap: 15px; margin-bottom: 30px; }
.levelBtn { width: 50px; height: 50px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.levelBtn.selected { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 20px currentColor; }
.levelBtn[data-level="1"] { background: linear-gradient(#ff69b4,#ff1493); }
.levelBtn[data-level="2"] { background: linear-gradient(#ff8c00,#ffd700); }
.levelBtn[data-level="3"] { background: linear-gradient(#32cd32,#228b22); }
.levelBtn[data-level="4"] { background: linear-gradient(#333,#666); }

#gameUI { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; display: none; }
#gameUI.show { display: flex; }

.uiBox { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; color: #fff; font-size: clamp(0.9rem, 3vw, 1.1rem); border: 1px solid rgba(255,140,0,0.3); }
.uiBox span { color: #ffd700; font-weight: bold; }
</style>
</head>
<body>
<div id="game"></div>
<div class="sun"></div>
<div class="palm left">🌴</div>
<div class="palm right">🌴</div>

<div id="startScreen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">第2关：热带夏日 🌺</div>
  <div class="levelSelect">
    <div class="levelBtn" data-level="1" onclick="selectLevel(this, 1)">1</div>
    <div class="levelBtn selected" data-level="2" onclick="selectLevel(this, 2)">2</div>
    <div class="levelBtn" data-level="3" onclick="selectLevel(this, 3)">3</div>
    <div class="levelBtn" data-level="4" onclick="selectLevel(this, 4)">4</div>
  </div>
  <button class="startBtn" id="startBtn" onclick="startGame()">开始游戏</button>
  <div class="hint">← → 左右移动 | 触碰障碍物游戏结束</div>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
  <div class="uiBox" style="font-size: 0.8rem;">🌺 热带夏日</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
console.log('[1] 热带夏日主题加载中');

var CONFIG = {
  themes: { 
    pink: { bg: 0x1a0a15, ground: 0xff69b4, accent: 0xff1493, obstacle: 0xff3366, light: 0xff00ff },
    tropical: { bg: 0x1a0a30, ground: 0xf4a460, accent: 0xff8c00, obstacle: 0x228b22, light: 0xffd700 },
    forest: { bg: 0x0a150a, ground: 0x32cd32, accent: 0x228b22, obstacle: 0x8b4513, light: 0x00ff00 },
    minimal: { bg: 0x111111, ground: 0x333333, accent: 0xffffff, obstacle: 0x666666, light: 0xffffff }
  },
  laneWidth: 8, speed: 0.4
};

var currentLevel = 2;
var gameRunning = false, score = 0, distance = 0, playerX = 0, targetX = 0;
var obstacles = [];

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a30);
scene.fog = new THREE.Fog(0xff8c00, 20, 80);

var camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 6);
camera.lookAt(0, 1, -5);

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('game').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
var sunLight = new THREE.PointLight(0xffd700, 1.5, 40);
sunLight.position.set(5, 10, -10);
scene.add(sunLight);
var sunsetLight = new THREE.PointLight(0xff8c00, 0.8, 30);
sunsetLight.position.set(-5, 5, 5);
scene.add(sunsetLight);

function createPalmTree(x, z) {
  var palm = new THREE.Group();
  var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 3, 8), new THREE.MeshStandardMaterial({color: 0x8b4513}));
  trunk.position.y = 1.5;
  palm.add(trunk);
  var leafColors = [0x228b22, 0x32cd32, 0x006400];
  for(var i = 0; i < 6; i++) {
    var leaf = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.5), new THREE.MeshStandardMaterial({color: leafColors[i % 3], side: THREE.DoubleSide, transparent: true, opacity: 0.9}));
    leaf.position.y = 3;
    leaf.rotation.y = (i / 6) * Math.PI * 2;
    leaf.rotation.x = -0.5;
    palm.add(leaf);
  }
  palm.position.set(x, 0, z);
  return palm;
}

for (var i = 0; i < 8; i++) {
  scene.add(createPalmTree(-6 - Math.random() * 2, -i * 15));
  scene.add(createPalmTree(6 + Math.random() * 2, -i * 15));
}

var ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 200), new THREE.MeshStandardMaterial({color: 0xf4a460, emissive: 0xff8c00, emissiveIntensity: 0.05}));
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
scene.add(ground);

var sandLines = new THREE.GridHelper(200, 40, 0xdeb887, 0xdeb887);
sandLines.position.y = 0.01;
sandLines.position.z = -80;
scene.add(sandLines);

var grid = new THREE.GridHelper(200, 80, 0xffd700, 0x8b4513);
grid.position.z = -80;
scene.add(grid);

var player = new THREE.Group();
var boardMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.08, 2.2), new THREE.MeshStandardMaterial({color: 0x333333, emissive: 0xff8c00, emissiveIntensity: 0.1}));
boardMesh.position.y = 0.2;
player.add(boardMesh);
var bodyMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.5, 16, 1), new THREE.MeshStandardMaterial({color: 0xff8c00, emissive: 0xff8c00, emissiveIntensity: 0.3}));
bodyMesh.position.y = 0.9;
player.add(bodyMesh);
var headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), new THREE.MeshStandardMaterial({color: 0xffdbac}));
headMesh.position.y = 1.55;
player.add(headMesh);
var hatMesh = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.15, 16), new THREE.MeshStandardMaterial({color: 0xf4a460}));
hatMesh.position.y = 1.75;
player.add(hatMesh);
player.position.y = 0.5;
scene.add(player);

function spawnObstacle() {
  var type = Math.random();
  var obs;
  if (type < 0.5) {
    obs = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1, 8), new THREE.MeshStandardMaterial({color: 0x8b4513}));
  } else {
    obs = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({color: 0x228b22}));
  }
  obs.position.set((Math.random()-0.5)*CONFIG.laneWidth, 0.5, -80-Math.random()*40);
  scene.add(obs);
  obstacles.push(obs);
}

for(var i=0; i<15; i++) spawnObstacle();

function setTheme(t) {
  var theme = CONFIG.themes[t];
  if (!theme) return;
  scene.background = new THREE.Color(theme.bg);
  ground.material.color.setHex(theme.ground);
  ground.material.emissive.setHex(theme.accent);
  ground.material.emissiveIntensity = 0.05;
  sunLight.color.setHex(theme.light);
  sunsetLight.color.setHex(theme.accent);
  obstacles.forEach(function(o) { o.material.color.setHex(theme.obstacle); });
}

setTheme('tropical');

window.selectLevel = function(el, level) {
  document.querySelectorAll('.levelBtn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  var themes = { 1: 'pink', 2: 'tropical', 3: 'forest', 4: 'minimal' };
  currentLevel = level;
  setTheme(themes[level]);
  var levelNames = { 1: '粉色浪漫', 2: '热带夏日', 3: '森林氧吧', 4: '极简黑白' };
  document.querySelector('.subtitle').textContent = '第' + level + '关：' + levelNames[level] + ' 🌺';
  document.querySelector('#gameUI .uiBox:last-child').textContent = levelNames[level];
};

document.addEventListener('touchmove', function(e) { if(gameRunning) { e.preventDefault(); targetX = (e.touches[0].clientX/window.innerWidth-0.5)*CONFIG.laneWidth; } }, {passive:false});
document.addEventListener('touchend', function() { targetX = 0; });
document.addEventListener('mousemove', function(e) { if(gameRunning) targetX = (e.clientX/window.innerWidth-0.5)*CONFIG.laneWidth; });
document.addEventListener('mouseup', function() { if(gameRunning) targetX = 0; });

window.startGame = function() {
  gameRunning = true;
  score = 0; distance = 0; playerX = 0; targetX = 0;
  obstacles.forEach(function(o) { o.position.z = -50-Math.random()*30; o.position.x = (Math.random()-0.5)*CONFIG.laneWidth; });
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
};

function gameOver() {
  gameRunning = false;
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('gameUI').style.display = 'none';
}

function checkCollision() {
  for(var k=0; k<obstacles.length; k++) {
    var obs = obstacles[k];
    var dx = Math.abs(obs.position.x - player.position.x);
    var dy = Math.abs(obs.position.y - player.position.y);
    var dz = Math.abs(obs.position.z - player.position.z);
    if(dx < 0.8 && dy < 1.2 && dz < 0.8) return true;
  }
  return false;
}

function gameLoop() {
  if(gameRunning) {
    playerX += (targetX - playerX) * 0.1;
    player.position.x = playerX;
    player.rotation.z = (targetX - playerX) * 0.15;
    player.position.y = 0.5 + Math.sin(Date.now()*0.008)*0.08;
    obstacles.forEach(function(o) { o.position.z += CONFIG.speed; if(o.position.z > 10) { o.position.z = -50-Math.random()*30; o.position.x = (Math.random()-0.5)*CONFIG.laneWidth; } });
    if(Math.random() < 0.015) spawnObstacle();
    if(checkCollision()) gameOver();
    distance += CONFIG.speed;
    score = Math.floor(distance);
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
  }
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
