<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>滑板人生</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
#s{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(#1a0a20,#0a0a1a);z-index:10}
#s.hidden{display:none}
.btn{background:linear-gradient(#0ff,#f0f);color:#fff;border:none;padding:15px 50px;font-size:1.2rem;border-radius:30px;cursor:pointer;margin:10px}
#u{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;display:none;z-index:5}
#u.show{display:flex}
.sc{background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:20px}
</style>
</head>
<body>
<div id="s">
<h1>🛹 滑板人生</h1>
<p>3D跑酷</p>
<button class="btn" id="startBtn">开始游戏</button>
<p style="margin-top:20px;color:#888">左右移动躲避</p>
</div>
<div id="u">
<div class="sc">⭐ <span id="sc">0</span></div>
<div class="sc">🏃 <span id="di">0</span>m</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const log = msg => { console.log(msg); document.body.innerHTML += msg + '<br>' };
log('开始');

const s = document.getElementById('s'), u = document.getElementById('u');
const sc = document.getElementById('sc'), di = document.getElementById('di');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, -5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0x00ffff, 0.8);
light.position.set(5, 10, 5);
scene.add(light);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 200), new THREE.MeshStandardMaterial({color:0x00ffff}));
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
scene.add(ground);

const player = new THREE.Group();
player.add(new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 1.5), new THREE.MeshStandardMaterial({color:0x8b4513})).position.y = 0.2);
player.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.5, 4, 8), new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x004444})).position.y = 0.9);
player.add(new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({color:0xffdbac})).position.y = 1.5);
player.position.y = 0.5;
scene.add(player);

let obstacles = [];
for(let i = 0; i < 15; i++) {
  const o = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.8), new THREE.MeshStandardMaterial({color:0xff4444}));
  o.position.set((Math.random() - 0.5) * 6, 0.5, -50 - Math.random() * 30);
  scene.add(o);
  obstacles.push(o);
}

let running = false, score = 0, dist = 0, px = 0, tx = 0;

document.getElementById('startBtn').onclick = () => {
  log('点击开始');
  s.classList.add('hidden');
  u.classList.add('show');
  obstacles.forEach(o => o.position.z = -50 - Math.random() * 30);
  score = 0; dist = 0; px = 0; tx = 0;
  running = true;
  log('游戏运行中');
};

addEventListener('touchstart', e => tx = (e.touches[0].clientX / innerWidth - 0.5) * 6);
addEventListener('touchmove', e => { if(running) { e.preventDefault(); tx = (e.touches[0].clientX / innerWidth - 0.5) * 6; }});
addEventListener('touchend', () => tx = 0);
addEventListener('mousemove', e => { if(running) tx = (e.clientX / innerWidth - 0.5) * 6 });

function checkCollide() {
  for(let o of obstacles) {
    if(Math.abs(o.position.x - px) < 0.8 && Math.abs(o.position.z) < 0.8) return true;
  }
  return false;
}

function animate() {
  requestAnimationFrame(animate);
  if(running) {
    px += (tx - px) * 0.1;
    player.position.x = px;
    player.rotation.z = (tx - px) * 0.15;
    
    obstacles.forEach(o => o.position.z += 0.25);
    obstacles = obstacles.filter(o => {
      if(o.position.z > 10) { scene.remove(o); return false; }
      return true;
    });
    if(Math.random() < 0.02) {
      const o = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.8), new THREE.MeshStandardMaterial({color:0xff4444}));
      o.position.set((Math.random() - 0.5) * 6, 0.5, -60);
      scene.add(o);
      obstacles.push(o);
    }
    
    if(checkCollide()) {
      running = false;
      s.classList.remove('hidden');
      u.classList.remove('show');
    }
    
    dist += 0.25;
    score = Math.floor(dist);
    sc.textContent = score;
    di.textContent = Math.floor(dist);
  }
  renderer.render(scene, camera);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

log('完成');
animate();
</script>
</body>
</html>
