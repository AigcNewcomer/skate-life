<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>测试 Three.js</title>
<style>
body { margin: 0; overflow: hidden; background: #000; }
#info { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-family: sans-serif; text-align: center; }
</style>
</head>
<body>
<div id="info">正在加载...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const info = document.getElementById('info');

if (typeof THREE === 'undefined') {
  info.innerHTML = '❌ Three.js 未加载<br>请检查网络';
} else {
  info.innerHTML = '✅ Three.js 已加载: r' + THREE.REVISION + '<br>正在初始化...';
  
  // 简单3D测试
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x001122);
  
  const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 5;
  
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);
  
  // 立方体
  const geometry = new THREE.BoxGeometry(1, 1, 1);
  const material = new THREE.MeshBasicMaterial({color: 0x00ff00});
  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);
  
  // 按钮
  const btn = document.createElement('button');
  btn.textContent = '开始游戏';
  btn.style.cssText = 'position:absolute;bottom:100px;left:50%;transform:translateX(-50%);padding:15px 40px;font-size:20px;background:linear-gradient(#0ff,#f0f);border:none;border-radius:30px;color:#fff;cursor:pointer;';
  btn.onclick = () => info.innerHTML = '🎮 游戏开始！';
  document.body.appendChild(btn);
  
  function animate() {
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  
  info.innerHTML = '✅ Three.js 正常!<br>点击按钮测试';
  animate();
}
</script>
</body>
</html>
