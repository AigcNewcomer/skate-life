<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 - 3D跑酷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Orbitron', sans-serif;
}

#game { width: 100%; height: 100%; }

/* 开始/结束界面 */
.screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.5s;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
}

#startScreen {
  background: linear-gradient(180deg, #0d0015 0%, #1a0a2e 50%, #0d0015 100%);
}

#gameOverScreen {
  background: rgba(0,0,0,0.9);
}

/* 标题 */
.title {
  font-size: clamp(2.5rem, 10vw, 5rem);
  color: #fff;
  text-shadow: 0 0 30px #0ff, 0 0 60px #0ff, 0 0 90px #f0f;
  margin-bottom: 10px;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 30px #0ff, 0 0 60px #0ff; }
  to { text-shadow: 0 0 40px #f0f, 0 0 80px #f0f, 0 0 120px #0ff; }
}

.subtitle {
  font-size: clamp(0.8rem, 3vw, 1.2rem);
  color: rgba(255,255,255,0.6);
  margin-bottom: 30px;
  letter-spacing: 8px;
}

/* 难度选择 */
.difficulty {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

.diffBtn {
  padding: 12px 24px;
  border-radius: 25px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
}

.diffBtn:hover { background: rgba(255,255,255,0.2); }
.diffBtn.selected {
  border-color: #0ff;
  background: rgba(0,255,255,0.2);
  box-shadow: 0 0 20px rgba(0,255,255,0.5);
}

.diffBtn.easy { border-color: #4CAF50; }
.diffBtn.easy.selected { background: rgba(76,175,80,0.3); box-shadow: 0 0 20px rgba(76,175,80,0.5); }
.diffBtn.medium { border-color: #FF9800; }
.diffBtn.medium.selected { background: rgba(255,152,0,0.3); box-shadow: 0 0 20px rgba(255,152,0,0.5); }
.diffBtn.hard { border-color: #f44336; }
.diffBtn.hard.selected { background: rgba(244,67,54,0.3); box-shadow: 0 0 20px rgba(244,67,54,0.5); }

/* 按钮 */
.gameBtn {
  background: linear-gradient(135deg, #0ff 0%, #f0f 50%, #0ff 100%);
  background-size: 200% 200%;
  color: #000;
  border: none;
  padding: 18px 50px;
  font-size: clamp(1rem, 4vw, 1.3rem);
  font-family: 'Orbitron', sans-serif;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  animation: gradientShift 3s ease infinite;
  box-shadow: 0 0 30px rgba(0,255,255,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.gameBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px rgba(0,255,255,0.8);
}

.gameBtn:active { transform: scale(0.95); }

/* 提示 */
.hint {
  position: absolute;
  bottom: 40px;
  color: rgba(255,255,255,0.4);
  font-size: 0.8rem;
  letter-spacing: 2px;
}

/* 游戏UI */
#gameUI {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.3s;
}

#gameUI.show { opacity: 1; }

.uiBox {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 12px 24px;
  border-radius: 30px;
  color: #fff;
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  border: 1px solid rgba(0,255,255,0.3);
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

.uiBox span { color: #0ff; font-weight: bold; }

/* 关卡显示 */
.level {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 20px;
  color: #f0f;
  font-size: 1rem;
  border: 1px solid rgba(255,0,255,0.3);
}
</style>
</head>
<body>
<div id="game"></div>

<!-- 开始界面 -->
<div id="startScreen" class="screen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  
  <div class="difficulty">
    <button class="diffBtn easy selected" onclick="setDifficulty('easy')">简单</button>
    <button class="diffBtn medium" onclick="setDifficulty('medium')">中等</button>
    <button class="diffBtn hard" onclick="setDifficulty('hard')">困难</button>
  </div>
  
  <button class="gameBtn" id="startBtn" onclick="startGame()">开始游戏</button>
  <div class="hint">← → 左右移动 | 躲避红色障碍</div>
</div>

<!-- 游戏结束界面 -->
<div id="gameOverScreen" class="screen hidden">
  <div class="title" id="gameOverTitle">😢 游戏结束</div>
  <div class="subtitle" id="finalScore">得分: 0</div>
  <button class="gameBtn" onclick="startGame()">再来一次</button>
  <button class="gameBtn" onclick="showStart()" style="background:linear-gradient(#666,#444)">返回主页</button>
</div>

<!-- 游戏UI -->
<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>

<div class="level" id="levelDisplay">第 1 关</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== 游戏配置 ====================
const CONFIG = {
  easy: { speed: 0.25, obstacleCount: 8, spawnDist: 100 },
  medium: { speed: 0.4, obstacleCount: 12, spawnDist: 80 },
  hard: { speed: 0.6, obstacleCount: 15, spawnDist: 60 }
};

// 8关主题
const LEVELS = [
  { name: '第 1 关', theme: 'pink', bg: 0x1a0a15, ground: 0xff69b4, accent: 0xff1493 },
  { name: '第 2 关', theme: 'summer', bg: 0x1a1005, ground: 0xff6347, accent: 0xffd700 },
  { name: '第 3 关', theme: 'forest', bg: 0x051005, ground: 0x228b22, accent: 0x90ee90 },
  { name: '第 4 关', theme: 'bw', bg: 0x0a0a0a, ground: 0xffffff, accent: 0x888888 },
  { name: '第 5 关', theme: 'space', bg: 0x000010, ground: 0x4444ff, accent: 0xff00ff },
  { name: '第 6 关', theme: 'ice', bg: 0x051520, ground: 0x88ddff, accent: 0x00ffff },
  { name: '第 7 关', theme: 'desert', bg: 0x1a1000, ground: 0xff8800, accent: 0xff4400 },
  { name: '第 8 关', theme: 'cyber', bg: 0x0a0015, ground: 0x00ffff, accent: 0xff00ff }
];

// 游戏状态
var difficulty = 'easy';
var currentLevel = 0;
var gameRunning = false;
var score = 0;
var distance = 0;
var levelScore = 0;
var playerX = 0;
var targetX = 0;
var obstacles = [];

// ==================== Three.js 场景 ====================
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 6);
camera.lookAt(0, 1, -5);

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('game').appendChild(renderer.domElement);

// 灯光
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
var pointLight = new THREE.PointLight(0xff00ff, 1, 30);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// 地面
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 200),
  new THREE.MeshStandardMaterial({color:0xff69b4,emissive:0xff1493,emissiveIntensity:0.1})
);
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
scene.add(ground);

// 网格
var grid = new THREE.GridHelper(200, 80, 0x00ffff, 0x222244);
grid.position.z = -80;
scene.add(grid);

// 粒子效果
var particleCount = 300;
var particleGeo = new THREE.BufferGeometry();
var particlePositions = new Float32Array(particleCount * 3);
for(var i=0; i<particleCount*3; i+=3) {
  particlePositions[i] = (Math.random()-0.5)*20;
  particlePositions[i+1] = Math.random()*15;
  particlePositions[i+2] = -Math.random()*100;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
var particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({color:0x00ffff, size:0.08, transparent:true, opacity:0.6}));
scene.add(particles);

// 玩家
var player = new THREE.Group();

// 滑板
var boardMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.2, 0.08, 2.2),
  new THREE.MeshStandardMaterial({color:0x333333})
);
boardMesh.position.y = 0.2;
player.add(boardMesh);

// 身体
var bodyMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.25, 0.25, 0.5, 16),
  new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
);
bodyMesh.position.y = 0.9;
player.add(bodyMesh);

// 头
var headMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 16, 16),
  new THREE.MeshStandardMaterial({color:0xffdbac})
);
headMesh.position.y = 1.55;
player.add(headMesh);

player.position.y = 0.5;
scene.add(player);

// ==================== 游戏逻辑 ====================
function setLevel(n) {
  currentLevel = Math.min(n, LEVELS.length-1);
  var level = LEVELS[currentLevel];
  
  scene.background = new THREE.Color(level.bg);
  ground.material.color.setHex(level.ground);
  ground.material.emissive.setHex(level.accent);
  pointLight.color.setHex(level.accent);
  particles.material.color.setHex(level.accent);
  
  document.getElementById('levelDisplay').textContent = level.name;
  
  // 清理旧障碍物
  obstacles.forEach(function(o) { scene.remove(o); });
  obstacles = [];
}

function setDifficulty(level) {
  difficulty = level;
  document.querySelectorAll('.diffBtn').forEach(function(b) { b.classList.remove('selected'); });
  document.querySelector('.diffBtn.'+level).classList.add('selected');
}

function spawnObstacle() {
  var config = CONFIG[difficulty];
  var obs = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({color:0xff3366})
  );
  obs.position.set(
    (Math.random()-0.5)*8,
    0.5,
    -config.spawnDist - Math.random()*30
  );
  scene.add(obs);
  obstacles.push(obs);
}

function startGame() {
  score = 0;
  distance = 0;
  levelScore = 0;
  playerX = 0;
  targetX = 0;
  
  setLevel(0);
  
  // 生成障碍物
  var config = CONFIG[difficulty];
  for(var i=0; i<config.obstacleCount; i++) {
    spawnObstacle();
  }
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('gameUI').classList.add('show');
  
  gameRunning = true;
}

function showStart() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

function gameOver() {
  gameRunning = false;
  document.getElementById('gameUI').classList.remove('show');
  document.getElementById('gameOverScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = '得分: ' + score + ' | 距离: ' + Math.floor(distance) + 'm';
}

function checkCollision() {
  var config = CONFIG[difficulty];
  var playerBox = {x: player.position.x, y: player.position.y, z: 0, w: 0.8, h: 1.5, d: 1};
  
  for(var k=0; k<obstacles.length; k++) {
    var obs = obstacles[k];
    var dx = Math.abs(obs.position.x - player.position.x);
    var dy = Math.abs(obs.position.y - player.position.y);
    var dz = Math.abs(obs.position.z);
    
    // 放宽碰撞检测
    if(dx < 1.2 && dy < 1.5 && dz < 1.5) return true;
  }
  return false;
}

// ==================== 输入控制 ====================
document.addEventListener('touchmove', function(e) {
  if(gameRunning) {
    e.preventDefault();
    targetX = (e.touches[0].clientX/window.innerWidth-0.5)*8;
  }
}, {passive:false});
document.addEventListener('touchend', function() { targetX = 0; });
document.addEventListener('mousemove', function(e) {
  if(gameRunning) targetX = (e.clientX/window.innerWidth-0.5)*8;
});
document.addEventListener('mouseup', function() { if(gameRunning) targetX = 0; });

// ==================== 游戏循环 ====================
function gameLoop() {
  if(gameRunning) {
    var config = CONFIG[difficulty];
    
    // 玩家移动
    playerX += (targetX - playerX) * 0.1;
    player.position.x = playerX;
    player.rotation.z = (targetX - playerX) * 0.15;
    player.position.y = 0.5 + Math.sin(Date.now()*0.008)*0.08;
    
    // 障碍物移动
    obstacles.forEach(function(o) {
      o.position.z += config.speed;
    });
    
    // 重置障碍物
    obstacles.forEach(function(o) {
      if(o.position.z > 10) {
        o.position.z = -config.spawnDist - Math.random()*30;
        o.position.x = (Math.random()-0.5)*8;
      }
    });
    
    // 随机生成
    if(Math.random() < 0.01) spawnObstacle();
    
    // 碰撞检测
    if(checkCollision()) {
      gameOver();
    }
    
    // 分数
    distance += config.speed;
    score = Math.floor(distance);
    levelScore = Math.floor(distance);
    
    // 通关检查 (每500分升一级)
    if(levelScore > 500 && currentLevel < LEVELS.length-1) {
      currentLevel++;
      setLevel(currentLevel);
      levelScore = 0;
    }
    
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
    
    // 粒子移动
    var positions = particles.geometry.attributes.position.array;
    for(var i=0; i<positions.length; i+=3) {
      positions[i+2] += config.speed * 0.3;
      if(positions[i+2] > 10) positions[i+2] = -100;
    }
    particles.geometry.attributes.position.needsUpdate = true;
  }
  
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

// ==================== 初始化 ====================
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

setLevel(0);
gameLoop();

console.log('滑板人生 3D - 初始化完成');
</script>
</body>
</html>
