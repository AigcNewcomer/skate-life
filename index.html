<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 3D - 精致版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
#game { width: 100%; height: 100%; display: block; }

.screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: linear-gradient(135deg, #0a0012 0%, #1a0a2e 50%, #0a0012 100%); transition: opacity 0.5s; }
.screen.hidden { opacity: 0; pointer-events: none; }

.title { font-size: clamp(2.5rem, 12vw, 6rem); color: #fff; text-shadow: 0 0 40px #0ff, 0 0 80px #0ff, 0 0 120px #f0f; margin-bottom: 15px; animation: glow 2s ease-in-out infinite alternate; letter-spacing: 4px; }
@keyframes glow { from { text-shadow: 0 0 40px #0ff, 0 0 80px #0ff; } to { text-shadow: 0 0 50px #f0f, 0 0 100px #f0f, 0 0 150px #0ff; } }
.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: rgba(255,255,255,0.5); margin-bottom: 40px; letter-spacing: 12px; }

.modeSelect { display: flex; flex-direction: column; gap: 18px; margin-bottom: 35px; width: min(320px, 80vw); }
.modeBtn { width: 100%; padding: 20px; border-radius: 16px; border: 2px solid rgba(0,255,255,0.3); background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1)); color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; }
.modeBtn:hover { border-color: #0ff; box-shadow: 0 0 35px rgba(0,255,255,0.4); transform: scale(1.02); }
.modeBtn.selected { border-color: #0ff; background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(255,0,255,0.2)); box-shadow: 0 0 45px rgba(0,255,255,0.5); }
.modeBtn.locked { opacity: 0.5; }
.modeBtn.locked::after { content: ' 🔒'; margin-left: 10px; }

.difficulty { display: flex; gap: 15px; margin-bottom: 35px; }
.diffBtn { padding: 14px 28px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
.diffBtn:hover { background: rgba(255,255,255,0.15); }
.diffBtn.selected { border-color: #0ff; box-shadow: 0 0 25px rgba(0,255,255,0.5); }
.diffBtn.easy.selected { border-color: #4CAF50; }
.diffBtn.medium.selected { border-color: #FF9800; }
.diffBtn.hard.selected { border-color: #f44336; }

.gameBtn { background: linear-gradient(135deg, #0ff, #f0f, #0ff); background-size: 200% 200%; color: #000; border: none; padding: 20px 60px; font-size: clamp(1rem, 4vw, 1.4rem); font-family: 'Orbitron'; font-weight: bold; border-radius: 60px; cursor: pointer; animation: gradientShift 3s ease infinite; box-shadow: 0 0 40px rgba(0,255,255,0.5); transition: transform 0.2s; }
@keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.gameBtn:hover { transform: scale(1.08); box-shadow: 0 0 60px rgba(0,255,255,0.7); }

.stats { margin-top: 30px; color: rgba(255,255,255,0.4); font-size: 1rem; display: flex; gap: 30px; }
.stats span { color: #0ff; font-weight: bold; }

#gameUI { position: fixed; top: 0; left: 0; right: 0; padding: 20px 25px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 0.3s; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
#gameUI.show { opacity: 1; }
.uiBox { background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); padding: 14px 24px; border-radius: 35px; color: #fff; font-size: 1.1rem; border: 1px solid rgba(0,255,255,0.35); }
.uiBox span { color: #0ff; font-weight: bold; }
.level { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 30px; color: #f0f; font-size: 1rem; border: 1px solid rgba(255,0,255,0.35); }
.levelProgress { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: min(400px, 60%); height: 10px; background: rgba(255,255,255,0.15); border-radius: 5px; overflow: hidden; }
.levelProgressBar { height: 100%; background: linear-gradient(90deg, #0ff, #f0f); border-radius: 5px; transition: width 0.3s; }
.soundBtn { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1px solid rgba(0,255,255,0.35); color: #0ff; font-size: 1.4rem; cursor: pointer; z-index: 60; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button class="soundBtn" onclick="toggleSound()">🔊</button>

<div id="startScreen" class="screen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  <div class="modeSelect">
    <button class="modeBtn selected" id="modeStory" onclick="setMode('story')">🏆 闯关模式</button>
    <button class="modeBtn locked" id="modeEndless" onclick="setMode('endless')">⚡ 极限模式</button>
  </div>
  <div class="difficulty">
    <button class="diffBtn easy" onclick="setDifficulty('easy')">简单</button>
    <button class="diffBtn medium selected" onclick="setDifficulty('medium')">中等</button>
    <button class="diffBtn hard" onclick="setDifficulty('hard')">困难</button>
  </div>
  <button class="gameBtn" onclick="startGame()">开始游戏</button>
  <div class="stats">最高分: <span id="highScoreDisplay">0</span> | 通关: <span id="levelProgressDisplay">0</span>/8</div>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">💎 <span id="coinDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>
<div class="level" id="levelDisplay">第 1 关</div>
<div class="levelProgress"><div class="levelProgressBar" id="progressBar"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========== 配置 ==========
const LANE_COUNT = { easy: 3, medium: 4, hard: 5 };
const LEVELS = [
  { name: '第 1 关', bg: 0x1a0a15, ground: 0xff69b4, accent: 0xff1493, fog: 0x1a0a15 },
  { name: '第 2 关', bg: 0x1a1005, ground: 0xff6347, accent: 0xffd700, fog: 0x1a1005 },
  { name: '第 3 关', bg: 0x051005, ground: 0x228b22, accent: 0x90ee90, fog: 0x051005 },
  { name: '第 4 关', bg: 0x0a0a0a, ground: 0x555555, accent: 0xaaaaaa, fog: 0x0a0a0a },
  { name: '第 5 关', bg: 0x000015, ground: 0x4444ff, accent: 0xff00ff, fog: 0x000015 },
  { name: '第 6 关', bg: 0x051520, ground: 0x88ddff, accent: 0x00ffff, fog: 0x051520 },
  { name: '第 7 关', bg: 0x1a1000, ground: 0xff6600, accent: 0xff3300, fog: 0x1a1000 },
  { name: '第 8 关', bg: 0x0a0015, ground: 0x00ffff, accent: 0xff00ff, fog: 0x0a0015 }
];
const GAME_SPEED = { easy: 0.18, medium: 0.3, hard: 0.5 };

// ========== 音效 ==========
let soundOn = true, audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type = 'sine', vol = 0.1) {
  if(!soundOn || !audioCtx) return;
  try { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type = type; osc.frequency.value = freq; g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur); osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); } catch(e) {} }
function playCoinSound() { tone(880, 0.06, 'sine', 0.08); setTimeout(() => tone(1100, 0.08, 'sine', 0.05), 40); }
function playHitSound() { tone(100, 0.3, 'sawtooth', 0.1); }
function playUpSound() { tone(523, 0.08); setTimeout(() => tone(659, 0.08), 60); setTimeout(() => tone(784, 0.12), 120); }
function playClickSound() { tone(440, 0.03, 'sine', 0.04); }
function toggleSound() { soundOn = !soundOn; document.querySelector('.soundBtn').textContent = soundOn ? '🔊' : '🔇'; if(soundOn) initAudio(); }

// ========== 状态 ==========
let gameMode = 'story', difficulty = 'medium', currentLevel = 0, gameRunning = false;
let score = 0, coins = 0, distance = 0, levelScore = 0, lastLevelScore = 0;
let playerLane = 1, targetLane = 1;
let obstacles = [], coinItems = [];
let highScore = parseInt(localStorage.getItem('sl_hs') || '0');
let maxLevel = parseInt(localStorage.getItem('sl_lv') || '0');

// ========== Three.js ==========
const canvas = document.getElementById('game');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a0a15, 20, 120);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 300);
camera.position.set(0, 6, 10);
camera.lookAt(0, 1, -15);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// 灯光
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(10, 20, 10); sun.castShadow = true; sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048; sun.shadow.camera.near = 1; sun.shadow.camera.far = 50; scene.add(sun);
const neonL1 = new THREE.PointLight(0x00ffff, 2, 60); neonL1.position.set(-10, 10, 0); scene.add(neonL1);
const neonL2 = new THREE.PointLight(0xff00ff, 2, 60); neonL2.position.set(10, 10, 0); scene.add(neonL2);

// 地面
const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 300), new THREE.MeshStandardMaterial({ color: 0xff69b4, metalness: 0.5, roughness: 0.5 }));
ground.rotation.x = -Math.PI/2; ground.position.z = -120; ground.receiveShadow = true; scene.add(ground);

// 网格
const grid = new THREE.GridHelper(300, 120, 0x00ffff, 0x111133); grid.position.z = -120; scene.add(grid);

// 玩家
const player = new THREE.Group();

// 滑板
const board = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.12, 2.8), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 }));
board.position.y = 0.25; board.castShadow = true; player.add(board);
const boardGlow = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.02, 2.9), new THREE.MeshBasicMaterial({ color: 0x00ffff })); boardGlow.position.y = 0.32; player.add(boardGlow);

// 轮子
const wheelGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
[[-0.55, 0.15, 1], [0.55, 0.15, 1], [-0.55, 0.15, -1], [0.55, 0.15, -1]].forEach(p => { const w = new THREE.Mesh(wheelGeo, wheelMat); w.rotation.z = Math.PI/2; w.position.set(...p); player.add(w); });

// 身体
const body = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.9, 12), new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.6, roughness: 0.4 }));
body.position.y = 0.95; body.castShadow = true; player.add(body);

// 头
const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 20, 20), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
head.position.y = 1.7; head.castShadow = true; player.add(head);

// 头发
const hair = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshStandardMaterial({ color: 0x2a1a0a }));
hair.position.y = 1.85; player.add(hair);

// 墨镜
const glasses = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.12, 0.14), new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0 }));
glasses.position.set(0, 1.72, 0.25); player.add(glasses);
const glint = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.02, 0.02), new THREE.MeshBasicMaterial({ color: 0x00ffff })); glint.position.set(0, 1.7, 0.32); player.add(glint);

// 手臂
const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 8);
const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
const leftArm = new THREE.Mesh(armGeo, skinMat); leftArm.position.set(-0.5, 1.05, 0); leftArm.rotation.z = 0.45; player.add(leftArm);
const rightArm = new THREE.Mesh(armGeo, skinMat); rightArm.position.set(0.5, 1.05, 0); rightArm.rotation.z = -0.45; player.add(rightArm);

// 腿
const legGeo = new THREE.CylinderGeometry(0.1, 0.09, 0.6, 8);
const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a });
const leftLeg = new THREE.Mesh(legGeo, pantsMat); leftLeg.position.set(-0.25, 0.5, 0); player.add(leftLeg);
const rightLeg = new THREE.Mesh(legGeo, pantsMat); rightLeg.position.set(0.25, 0.5, 0); player.add(rightLeg);

player.position.y = 0; scene.add(player);

// 粒子
const particleCount = 1000;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pCol = new Float32Array(particleCount * 3);
for(let i = 0; i < particleCount; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 50;
  pPos[i*3+1] = Math.random() * 30;
  pPos[i*3+2] = -Math.random() * 200;
  pCol[i*3] = Math.random() * 0.3; pCol[i*3+1] = 0.8 + Math.random() * 0.2; pCol[i*3+2] = 1;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
const particleMat = new THREE.PointsMaterial({ size: 0.2, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

// ========== 函数 ==========
function setMode(m) { gameMode = m; playClickSound(); document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('selected')); document.getElementById('mode' + (m === 'story' ? 'Story' : 'Endless')).classList.add('selected'); }
function setDifficulty(d) { difficulty = d; playClickSound(); document.querySelectorAll('.diffBtn').forEach(b => b.classList.remove('selected')); document.querySelector('.diffBtn.' + d).classList.add('selected'); }

function getLaneX(lane) {
  const lanes = LANE_COUNT[difficulty];
  const width = 9;
  return (lane - (lanes - 1) / 2) * (width / lanes);
}

function setLevel(n) {
  currentLevel = Math.min(n, LEVELS.length - 1);
  const lv = LEVELS[currentLevel];
  scene.background = new THREE.Color(lv.bg);
  scene.fog.color = new THREE.Color(lv.fog);
  ground.material.color.setHex(lv.ground);
  ground.material.emissive = new THREE.Color(lv.accent);
  ground.material.emissiveIntensity = 0.2;
  document.getElementById('levelDisplay').textContent = gameMode === 'endless' ? '⚡ 极限模式' : lv.name;
}

function spawnObstacles() {
  const lanes = LANE_COUNT[difficulty];
  const occupied = [];
  const numObs = Math.floor(Math.random() * (lanes - 1)) + 1; // 留至少1条空轨道
  
  while(occupied.length < numObs) {
    const lane = Math.floor(Math.random() * lanes);
    if(!occupied.includes(lane)) occupied.push(lane);
  }
  
  for(let i = 0; i < lanes; i++) {
    if(occupied.includes(i)) {
      const obs = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 1.4, 1.4),
        new THREE.MeshStandardMaterial({ color: 0xff2255, emissive: 0xff0044, emissiveIntensity: 0.5, metalness: 0.7, roughness: 0.3 })
      );
      obs.position.set(getLaneX(i), 0.8, -120 - Math.random() * 50);
      obs.castShadow = true;
      obs.userData.lane = i;
      scene.add(obs);
      obstacles.push(obs);
    }
  }
  
  // 金币 (出现在空轨道)
  if(Math.random() < 0.6) {
    let coinLane;
    do { coinLane = Math.floor(Math.random() * lanes); } while(occupied.includes(coinLane));
    const coin = new THREE.Mesh(
      new THREE.TorusGeometry(0.4, 0.12, 8, 24),
      new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.6, metalness: 1, roughness: 0.1 })
    );
    coin.position.set(getLaneX(coinLane), 1, -120 - Math.random() * 50);
    coin.userData.collected = false;
    scene.add(coin);
    coinItems.push(coin);
  }
}

function startGame() {
  playClickSound();
  score = 0; coins = 0; distance = 0; levelScore = 0; lastLevelScore = 0;
  playerLane = Math.floor(LANE_COUNT[difficulty] / 2);
  targetLane = playerLane;
  
  obstacles.forEach(o => scene.remove(o)); obstacles = [];
  coinItems.forEach(c => scene.remove(c)); coinItems = [];
  
  if(gameMode === 'story') setLevel(0); else setLevel(Math.floor(Math.random() * LEVELS.length));
  
  // 初始障碍物 - 更远
  for(let i = 0; i < 5; i++) {
    spawnObstacles();
    obstacles.forEach(function(o) { o.position.z = -120 - i * 100 - Math.random() * 30; });
    coinItems.forEach(c => c.position.z -= i * 80);
  }
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameUI').classList.add('show');
  gameRunning = true;
}

function gameOver() {
  gameRunning = false; playHitSound();
  document.getElementById('gameUI').classList.remove('show');
  document.getElementById('startScreen').classList.remove('hidden');
  
  if(score > highScore) { highScore = score; localStorage.setItem('sl_hs', highScore); }
  if(gameMode === 'story' && currentLevel > maxLevel) { maxLevel = currentLevel; localStorage.setItem('sl_lv', maxLevel); if(maxLevel >= 7) document.getElementById('modeEndless').classList.remove('locked'); }
  document.getElementById('highScoreDisplay').textContent = highScore;
  document.getElementById('levelProgressDisplay').textContent = maxLevel;
}

// 碰撞检测 - 基于轨道
function checkCollision() {
  const playerZ = 0;
  const lanes = LANE_COUNT[difficulty];
  
  for(const obs of obstacles) {
    const dz = Math.abs(obs.position.z - playerZ);
    if(obs.userData.lane === Math.round(playerLane) && dz < 3.5) {
      return true;
    }
  }
  return false;
}

function checkCoinCollection() {
  const playerZ = 0;
  for(let i = coinItems.length - 1; i >= 0; i--) {
    const coin = coinItems[i];
    if(coin.userData.collected) continue;
    const dz = Math.abs(coin.position.z - playerZ);
    if(dz < 2) {
      coin.userData.collected = true;
      scene.remove(coin);
      coinItems.splice(i, 1);
      coins++;
      score += 10;
      playCoinSound();
    }
  }
}

// 输入
document.addEventListener('keydown', e => {
  if(!gameRunning) return;
  const max = LANE_COUNT[difficulty] - 1;
  if(e.key === 'ArrowLeft' || e.key === 'a') targetLane = Math.max(0, targetLane - 1);
  if(e.key === 'ArrowRight' || e.key === 'd') targetLane = Math.min(max, targetLane + 1);
});

document.addEventListener('mousemove', e => {
  if(!gameRunning) return;
  const max = LANE_COUNT[difficulty] - 1;
  targetLane = Math.floor((e.clientX / window.innerWidth) * (max + 1));
  targetLane = Math.max(0, Math.min(max, targetLane));
});

document.addEventListener('touchstart', e => {
  if(!gameRunning) return;
  let startX = e.touches[0].clientX;
  const move = ev => {
    const diff = ev.touches[0].clientX - startX;
    if(Math.abs(diff) > 40) {
      const max = LANE_COUNT[difficulty] - 1;
      if(diff > 0) targetLane = Math.min(max, targetLane + 1);
      else targetLane = Math.max(0, targetLane - 1);
      startX = ev.touches[0].clientX;
    }
  };
  const end = () => { document.removeEventListener('touchmove', move); document.removeEventListener('touchend', end); };
  document.addEventListener('touchmove', move);
  document.addEventListener('touchend', end);
});

// 循环
function animate() {
  requestAnimationFrame(animate);
  
  if(gameRunning) {
    const speed = GAME_SPEED[difficulty] + (gameMode === 'endless' ? score * 0.00006 : 0);
    
    // 玩家
    playerLane += (targetLane - playerLane) * 0.1;
    player.position.x = getLaneX(Math.round(playerLane));
    player.rotation.z = (targetLane - playerLane) * 0.4;
    player.position.y = Math.sin(Date.now() * 0.004) * 0.08;
    
    // 障碍物
    obstacles.forEach(o => { o.position.z += speed; o.rotation.y += 0.02; });
    obstacles.forEach(o => { if(o.position.z > 25) { o.position.z = -120 - Math.random() * 40; o.userData.lane = Math.floor(Math.random() * LANE_COUNT[difficulty]); o.position.x = getLaneX(o.userData.lane); } });
    
    // 金币
    coinItems.forEach(c => { c.position.z += speed; c.rotation.z += 0.1; });
    coinItems = coinItems.filter(c => { if(c.position.z > 25) { scene.remove(c); return false; } return true; });
    
    // 生成
    if(Math.random() < 0.025) spawnObstacles();
    
    // 检测
    if(checkCollision()) { gameOver(); return; }
    checkCoinCollection();
    
    // 分数
    distance += speed;
    score += Math.floor(speed * 2);
    levelScore += Math.floor(speed * 2);
    
    // 升级
    if(gameMode === 'story' && levelScore > 500 && lastLevelScore <= 500) {
      playUpSound();
      if(currentLevel < LEVELS.length - 1) { currentLevel++; setLevel(currentLevel); }
      levelScore = 0;
    } else if(gameMode === 'endless' && levelScore > 200 && lastLevelScore <= 200) {
      playUpSound();
      setLevel(Math.floor(Math.random() * LEVELS.length));
      levelScore = 0;
    }
    lastLevelScore = levelScore;
    
    // UI
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('coinDisplay').textContent = coins;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
    const progress = (gameMode === 'endless' ? levelScore / 200 : levelScore / 500) * 100;
    document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
    
    // 粒子
    const pos = particleSystem.geometry.attributes.position.array;
    for(let i = 0; i < pos.length; i += 3) {
      pos[i+2] += speed * 0.5;
      if(pos[i+2] > 10) pos[i+2] = -200;
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
  }
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 初始化
document.getElementById('highScoreDisplay').textContent = highScore;
document.getElementById('levelProgressDisplay').textContent = maxLevel;
if(maxLevel >= 7) document.getElementById('modeEndless').classList.remove('locked');
setLevel(0);
initAudio();
animate();
console.log('滑板人生 3D 精致版 已加载');
</script>
</body>
