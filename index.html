<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>滑板人生 - 3D跑酷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
#game { width: 100%; height: 100%; }

#startScreen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #0d0015, #1a0a2e); z-index: 100; transition: opacity 0.5s; }
#startScreen.hidden { opacity: 0; pointer-events: none; }

.title { font-size: clamp(2rem, 8vw, 4rem); color: #fff; text-shadow: 0 0 30px #0ff, 0 0 60px #f0f; margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate; }
@keyframes glow { from { text-shadow: 0 0 30px #0ff; } to { text-shadow: 0 0 40px #f0f, 0 0 80px #0ff; } }

.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: rgba(255,255,255,0.6); margin-bottom: 40px; letter-spacing: 5px; }

.startBtn { background: linear-gradient(135deg, #0ff, #f0f); color: #000; border: none; padding: 18px 60px; font-size: clamp(1rem, 4vw, 1.3rem); font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(0,255,255,0.5); transition: transform 0.2s; }
.startBtn:hover { transform: scale(1.05); }

.hint { position: absolute; bottom: 40px; color: rgba(255,255,255,0.4); font-size: 0.8rem; }

#gameUI { position: absolute; top: 0; left: 0; right: 0; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 0.3s; }
#gameUI.show { opacity: 1; }

.uiBox { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; color: #fff; font-size: clamp(0.9rem, 3vw, 1.1rem); border: 1px solid rgba(0,255,255,0.3); }
.uiBox span { color: #0ff; font-weight: bold; }

.themeSelect { display: flex; gap: 15px; margin-bottom: 30px; }
.themeBtn { width: 50px; height: 50px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.3s; }
.themeBtn.selected { border-color: #fff; transform: scale(1.2); }
</style>
</head>
<body>
<div id="game"></div>

<div id="startScreen">
  <div class="title">🛹 滑板人生</div>
  <div class="subtitle">3D NEON RUNNER</div>
  <div class="themeSelect">
    <div class="themeBtn selected" style="background:linear-gradient(#ff69b4,#ff1493)" data-theme="pink" onclick="selectTheme(this, 'pink')"></div>
    <div class="themeBtn" style="background:linear-gradient(#00ff88,#00cc66)" data-theme="green" onclick="selectTheme(this, 'green')"></div>
    <div class="themeBtn" style="background:linear-gradient(#00ffff,#0088ff)" data-theme="blue" onclick="selectTheme(this, 'blue')"></div>
    <div class="themeBtn" style="background:linear-gradient(#ff00ff,#8800ff)" data-theme="purple" onclick="selectTheme(this, 'purple')"></div>
  </div>
  <button class="startBtn" id="startBtn">开始游戏</button>
  <div class="hint">← → 左右移动 | 触碰障碍物游戏结束</div>
</div>

<div id="gameUI">
  <div class="uiBox">⭐ <span id="scoreDisplay">0</span></div>
  <div class="uiBox">🏃 <span id="distDisplay">0</span>m</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
console.log('脚本加载');

// 游戏配置
const CONFIG = {
  themes: { pink: {bg:0x1a0a15,ground:0xff69b4,accent:0xff1493}, green: {bg:0x0a150a,ground:0x00ff88,accent:0x00ff00}, blue: {bg:0x0a0a1a,ground:0x00ffff,accent:0x0088ff}, purple: {bg:0x150a1a,ground:0xff00ff,accent:0x8800ff} },
  laneWidth: 8, speed: 0.4
};

let currentTheme = 'pink';
let gameRunning = false;
let score = 0, distance = 0, playerX = 0, targetX = 0;

// Three.js 场景
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 6);
camera.lookAt(0, 1, -5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('game').appendChild(renderer.domElement);

// 灯光
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const pointLight = new THREE.PointLight(0xff00ff, 1, 30);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// 地面
const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 200), new THREE.MeshStandardMaterial({color:0xff69b4,emissive:0xff1493,emissiveIntensity:0.1}));
ground.rotation.x = -Math.PI/2;
ground.position.z = -80;
scene.add(ground);

const grid = new THREE.GridHelper(200, 80, 0x00ffff, 0x222244);
grid.position.z = -80;
scene.add(grid);

// 玩家
const player = new THREE.Group();
player.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.08, 2.2), new THREE.MeshStandardMaterial({color:0x333333})).position.y = 0.15);
player.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.5, 4, 8), new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})).position.y = 0.9);
player.add(new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), new THREE.MeshStandardMaterial({color:0xffdbac})).position.y = 1.55);
player.position.y = 0.5;
scene.add(player);

// 障碍物
let obstacles = [];
function spawnObstacle() {
  const obs = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color:0xff3366}));
  obs.position.set((Math.random()-0.5)*CONFIG.laneWidth, 0.5, -50-Math.random()*30);
  scene.add(obs);
  obstacles.push(obs);
}
for(let i=0; i<15; i++) spawnObstacle();

// 主题
function setTheme(t) {
  currentTheme = t;
  const theme = CONFIG.themes[t];
  scene.background = new THREE.Color(theme.bg);
  ground.material.color.setHex(theme.ground);
  ground.material.emissive.setHex(theme.accent);
  pointLight.color.setHex(theme.accent);
}
setTheme('pink');

// 主题选择
window.selectTheme = function(el, t) {
  document.querySelectorAll('.themeBtn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  setTheme(t);
};

// 输入
document.addEventListener('touchmove', e => { if(gameRunning) { e.preventDefault(); targetX = (e.touches[0].clientX/innerWidth-0.5)*CONFIG.laneWidth; }}, {passive:false});
document.addEventListener('touchend', () => targetX = 0);
document.addEventListener('mousemove', e => { if(gameRunning) targetX = (e.clientX/innerWidth-0.5)*CONFIG.laneWidth; });
document.addEventListener('mouseup', () => { if(gameRunning) targetX = 0; });

// 按钮 - 关键修复：直接用 onclick 属性
document.getElementById('startBtn').onclick = function() {
  console.log('按钮点击');
  startGame();
};

function startGame() {
  console.log('开始游戏');
  gameRunning = true;
  obstacles.forEach(o => { o.position.z = -50-Math.random()*30; });
  score = 0; distance = 0; playerX = 0; targetX = 0;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameUI').classList.add('show');
}

function gameOver() {
  console.log('游戏结束');
  gameRunning = false;
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameUI').classList.remove('show');
}

function checkCollision() {
  for(let o of obstacles) {
    if(Math.abs(o.position.x - playerX) < 1 && Math.abs(o.position.z) < 1) return true;
  }
  return false;
}

function animate() {
  requestAnimationFrame(animate);
  
  if(gameRunning) {
    playerX += (targetX - playerX) * 0.1;
    player.position.x = playerX;
    player.rotation.z = (targetX - playerX) * 0.15;
    player.position.y = 0.5 + Math.sin(Date.now()*0.008) * 0.08;
    
    obstacles.forEach(o => o.position.z += CONFIG.speed);
    obstacles = obstacles.filter(o => {
      if(o.position.z > 10) { scene.remove(o); o.position.z = -50-Math.random()*30; scene.add(o); return true; }
      return o.position.z <= 10;
    });
    
    if(Math.random() < 0.015) spawnObstacle();
    if(checkCollision()) gameOver();
    
    distance += CONFIG.speed;
    score = Math.floor(distance);
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('distDisplay').textContent = Math.floor(distance);
  }
  
  renderer.render(scene, camera);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

console.log('初始化完成');
animate();
</script>
</body>
</html>
